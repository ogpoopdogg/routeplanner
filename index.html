        // ---------- UTILS ----------
        function formatTime12(ts) { /* not used but kept for consistency */ }

        // ========== ADDRESS PICKER FUNCTIONS ==========
        let pickerMap = null;
        let pickerMarker = null;
        let pickerGeocoder = null;
        let pickerAutocomplete = null;
        let pickerInitialized = false;
        let selectedLocation = null; // {lat, lng, address, plusCode}

        function initAddressPickerMap() {
            if (pickerInitialized) return;
            const container = document.getElementById('picker-map');
            if (!container) return;
            if (!google.maps) return;

            const defaultCenter = { lat: 49.8425, lng: -99.9497 };
            pickerMap = new google.maps.Map(container, {
                center: defaultCenter,
                zoom: 12,
                mapTypeId: 'roadmap',
                styles: mapStyles,
                gestureHandling: 'greedy'
            });

            // Geocoder
            pickerGeocoder = new google.maps.Geocoder();

            // Draggable marker
            pickerMarker = new google.maps.Marker({
                position: defaultCenter,
                map: pickerMap,
                draggable: true,
                animation: google.maps.Animation.DROP,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: '#ff9800',
                    fillOpacity: 1,
                    strokeColor: '#ffffff',
                    strokeWeight: 2
                }
            });

            // When marker is dragged, update info
            pickerMarker.addListener('dragend', function() {
                const pos = pickerMarker.getPosition();
                updatePickerInfo(pos.lat(), pos.lng());
            });

            // Click on map to move marker
            pickerMap.addListener('click', function(e) {
                const lat = e.latLng.lat();
                const lng = e.latLng.lng();
                pickerMarker.setPosition({ lat, lng });
                updatePickerInfo(lat, lng);
            });

            // Setup Places Autocomplete for search input
            const searchInput = document.getElementById('picker-search');
            if (searchInput) {
                pickerAutocomplete = new google.maps.places.Autocomplete(searchInput, {
                    types: ['geocode'],
                    componentRestrictions: { country: 'ca' }
                });
                pickerAutocomplete.addListener('place_changed', function() {
                    const place = pickerAutocomplete.getPlace();
                    if (!place.geometry) return;
                    const location = place.geometry.location;
                    const lat = location.lat();
                    const lng = location.lng();
                    pickerMap.panTo({ lat, lng });
                    pickerMap.setZoom(14);
                    pickerMarker.setPosition({ lat, lng });
                    updatePickerInfo(lat, lng);
                });
            }

            // Initially set marker to Brandon center and get address
            updatePickerInfo(defaultCenter.lat, defaultCenter.lng);

            pickerInitialized = true;
        }

        function openAddressPicker() {
            const modal = document.getElementById('address-picker-modal');
            modal.style.display = 'block';
            // Ensure map is initialized
            if (!pickerInitialized) {
                initAddressPickerMap();
            }
            // Trigger resize
            setTimeout(() => {
                if (pickerMap) {
                    google.maps.event.trigger(pickerMap, 'resize');
                    // If we have a selected location, center there, else center on current marker
                    const pos = pickerMarker.getPosition();
                    if (pos) {
                        pickerMap.setCenter(pos);
                    }
                }
            }, 100);
            // Clear search input
            document.getElementById('picker-search').value = '';
            // Update info if marker is set
            if (pickerMarker) {
                const pos = pickerMarker.getPosition();
                if (pos) {
                    updatePickerInfo(pos.lat(), pos.lng());
                }
            }
        }

        function closeAddressPicker() {
            document.getElementById('address-picker-modal').style.display = 'none';
        }

        function updatePickerInfo(lat, lng) {
            const latLng = { lat, lng };
            // Reverse geocode to get address and plus code
            pickerGeocoder.geocode({ location: latLng }, function(results, status) {
                let address = '';
                let plusCode = '';
                if (status === 'OK' && results.length > 0) {
                    // Get formatted address
                    address = results[0].formatted_address || '';
                    // Look for plus code in results
                    for (let result of results) {
                        if (result.types && result.types.includes('plus_code')) {
                            // This is a plus code result
                            plusCode = result.formatted_address || '';
                            break;
                        }
                        // Some results have address_components with plus_code? Actually plus code is a separate type.
                        // Also check for plus_code in the result's address_components? Not typical.
                        // Alternatively, we can use the Geocoding API's plus_code field.
                        // Since we are using the client-side geocoder, the plus code might be in the result's plus_code property.
                        if (result.plus_code) {
                            plusCode = result.plus_code.compound_code || result.plus_code.global_code || '';
                        }
                    }
                    // If no plus code found, try to get from address components? Not reliable.
                    // We can also generate plus code using the library? Not included.
                    // Fallback: use the lat/lng to construct a plus code using the Open Location Code library? Not included.
                    // We'll just use what we have.
                } else {
                    address = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
                }

                // If plusCode is empty, try to get from results again
                if (!plusCode) {
                    // Sometimes the plus code is in the address_components with type 'plus_code'
                    for (let result of results) {
                        if (result.address_components) {
                            for (let comp of result.address_components) {
                                if (comp.types && comp.types.includes('plus_code')) {
                                    plusCode = comp.long_name || comp.short_name || '';
                                    break;
                                }
                            }
                        }
                        if (plusCode) break;
                    }
                }

                // Store selected location
                selectedLocation = {
                    lat: lat,
                    lng: lng,
                    address: address,
                    plusCode: plusCode || ''
                };

                // Update UI
                document.getElementById('picker-address-display').textContent = address || 'Address not found';
                document.getElementById('picker-pluscode-display').textContent = plusCode ? `Plus Code: ${plusCode}` : 'Plus Code: —';
            });
        }

        // ---------- New: Search Address Picker (Go button) ----------
        function searchAddressPicker() {
            const input = document.getElementById('picker-search');
            const query = input.value.trim();
            if (!query) return;
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: query, region: 'ca' }, function(results, status) {
                if (status === 'OK' && results.length > 0) {
                    const location = results[0].geometry.location;
                    const lat = location.lat();
                    const lng = location.lng();
                    pickerMap.panTo({ lat, lng });
                    pickerMap.setZoom(14);
                    pickerMarker.setPosition({ lat, lng });
                    updatePickerInfo(lat, lng);
                } else {
                    alert('Location not found.');
                }
            });
        }

        function confirmAddress() {
            if (!selectedLocation) {
                alert("No location selected.");
                return;
            }
            // Prioritize actual address over plus code
            let addressToUse = selectedLocation.address || selectedLocation.plusCode;
            if (!addressToUse) {
                alert("Could not determine address.");
                return;
            }
            document.getElementById('f-address').value = addressToUse;
            closeAddressPicker();
        }
