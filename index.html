            const selectedDate = dateInput.value;
            if (!selectedDate) {
                alert("Please select a date.");
                return;
            }
            document.getElementById('date-modal').style.display = 'none';
            // Format date for display
            const dateObj = new Date(selectedDate + 'T00:00:00');
            const dateStr = dateObj.toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
            // Now build email
            buildAndSendEmail(dateStr);
        }

        function cancelDate() {
            document.getElementById('date-modal').style.display = 'none';
        }

        function buildAndSendEmail(dateStr) {
            const savedRoutesRef = db.ref('developer/route_planner/saved_routes');
            savedRoutesRef.once('value').then(snap => {
                const savedData = snap.val() || {};
                let bodyParts = [];

                // Process saved routes
                const keys = Object.keys(savedData);
                keys.forEach(key => {
                    const route = savedData[key];
                    const label = route.label || 'Unnamed';
                    const stops = route.stops || [];
                    if (stops.length === 0) return;
                    const etaMinutes = route.etaTotalMinutes || 0;
                    const etaKm = route.etaTotalKm || 0;
                    const content = buildRouteBody(label, stops, etaMinutes, etaKm, dateStr);
                    bodyParts.push(content);
                });

                // Process current route
                if (optimizedOrder && optimizedOrder.length > 0) {
                    const currentStops = [];
                    optimizedOrder.forEach(id => {
                        const job = jobs[id];
                        if (job) {
                            currentStops.push({
                                name: job.name,
                                city: job.city,
                                shipment_details: job.shipment_details || ''
                            });
                        }
                    });
                    if (currentStops.length > 0) {
                        const content = buildRouteBody('Current Route', currentStops, etaTotalMinutes, etaTotalKm, dateStr);
                        bodyParts.push(content);
                    }
                }

                if (bodyParts.length === 0) {
                    alert("No routes to share.");
                    return;
                }

                const emailBody = bodyParts.join('\n\n========================================\n\n');
                const subject = `Route Manifest for ${dateStr}`;
                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
                window.location.href = mailtoLink;

            }).catch(err => alert("Error loading saved routes: " + err.message));
        }

        // ---------- MAP FUNCTIONS (continued) ----------
        function openMap() {
            document.getElementById('map-modal').style.display = 'block';
            setTimeout(() => {
                google.maps.event.trigger(map, 'resize');
                if (optimizedOrder.length > 0 && activePolyline) {
                    const bounds = new google.maps.LatLngBounds();
                    activePolyline.getPath().forEach(p => bounds.extend(p));
                    map.fitBounds(bounds);
                } else {
                    map.setCenter({ lat: 49.8425, lng: -99.9497 });
                    map.setZoom(12);
                }
            }, 100);
        }

        function closeMap() {
            if (mapPickerMode) {
                // If picker is active, cancel it
                closeMapPicker();
                return;
            }
            document.getElementById('map-modal').style.display = 'none';
        }

        function zoomToAll() {
            if (activePolyline) {
                const bounds = new google.maps.LatLngBounds();
                activePolyline.getPath().forEach(p => bounds.extend(p));
                map.fitBounds(bounds);
            }
        }

        function resetMapView() {
            // Similar to resetDriverView but without driver
            zoomToAll();
        }

        // ---------- MAP PICKER FUNCTIONS ----------
        function openMapPicker() {
            // Open the map modal in picker mode
            mapPickerMode = true;
            document.getElementById('map-modal').style.display = 'block';
            document.getElementById('map-picker-controls').style.display = 'block';
            // Hide route controls and markers while in picker mode
            document.getElementById('close-map-btn').style.display = 'none';
            document.getElementById('zoom-out-btn').style.display = 'none';
            document.getElementById('reset-driver-view-btn').style.display = 'none';
            // Hide route polyline and markers
            if (activePolyline) {
                activePolyline.setMap(null);
                // Store to restore later
                savedPolylines = activePolyline;
            }
            // Hide mapMarkers
            Object.values(mapMarkers).forEach(m => m.setMap(null));
            // Also hide user tracking markers
            if (userMarker) userMarker.setMap(null);
            if (userCircle) userCircle.setMap(null);

            // Center map on default or last known location
            if (pickerLatLng) {
                map.setCenter(pickerLatLng);
                map.setZoom(15);
            } else {
                map.setCenter({ lat: 49.8425, lng: -99.9497 });
                map.setZoom(12);
            }
            // Remove any existing picker marker
            if (pickerMarker) {
                pickerMarker.setMap(null);
                pickerMarker = null;
            }
            // Ensure map is resized
            setTimeout(() => {
                google.maps.event.trigger(map, 'resize');
            }, 100);
        }

        function closeMapPicker() {
            mapPickerMode = false;
            document.getElementById('map-picker-controls').style.display = 'none';
            // Restore route controls
            document.getElementById('close-map-btn').style.display = 'flex';
            document.getElementById('zoom-out-btn').style.display = 'flex';
            document.getElementById('reset-driver-view-btn').style.display = 'none';
            // Restore route polyline
            if (savedPolylines) {
                savedPolylines.setMap(map);
                activePolyline = savedPolylines;
                savedPolylines = null;
            }
            // Restore markers
            Object.values(mapMarkers).forEach(m => m.setMap(map));
            // Restore user tracking markers if tracking
            if (isTracking) {
                // Restart tracking (this will re-watch)
                stopTracking();
                startTracking();
            }
            // Remove picker marker
            if (pickerMarker) {
                pickerMarker.setMap(null);
                pickerMarker = null;
            }
            // Close the map modal
            document.getElementById('map-modal').style.display = 'none';
        }

        function handleMapClick(e) {
            if (!mapPickerMode) return;
            const latLng = e.latLng;
            placePickerMarker(latLng);
        }

        function placePickerMarker(latLng) {
            if (pickerMarker) {
                pickerMarker.setPosition(latLng);
            } else {
                pickerMarker = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    draggable: true,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: 'red',
                        fillOpacity: 1,
                        strokeColor: 'white',
                        strokeWeight: 2
                    }
                });
                // Add dragend listener
                pickerMarker.addListener('dragend', function() {
                    pickerLatLng = this.getPosition();
                });
            }
            pickerLatLng = latLng;
            map.panTo(latLng);
        }

        function confirmLocation() {
            if (!pickerLatLng) {
                alert("Please select a location on the map.");
                return;
            }
            const lat = pickerLatLng.lat();
            const lng = pickerLatLng.lng();
            // Format coordinates (6 decimal places)
            const coordStr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('f-address').value = coordStr;
            closeMapPicker();
        }

        function searchCity() {
            const cityInput = document.getElementById('map-search-city');
            const city = cityInput.value.trim();
            if (!city) return;
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: city, region: 'ca' }, function(results, status) {
                if (status === 'OK' && results[0]) {
                    const location = results[0].geometry.location;
                    map.setCenter(location);
                    map.setZoom(13);
                    // Optionally place a marker at the city center? Not necessary.
                } else {
                    alert("City not found. Please try again.");
                }
            });
        }

        // ---------- EXTERNAL ROUTE NAVIGATION (similar to driver.html) ----------
        function openExternalRoute() {
            if (optimizedOrder.length === 0) {
                alert("No stops to route.");
                return;
            }
            const origin = "1604 Moreland Ave, Brandon MB";
            const destination = "1604 Moreland Ave, Brandon MB";
            const seenLocs = new Set();
            // Limit to first 25 stops for the external maps link (Google Maps URL limit)
            const maxStopsForExternal = 25;
            let stopsAdded = 0;
            const waypoints = optimizedOrder.map(id => {
                if (stopsAdded >= maxStopsForExternal) return "";
                const job = jobs[id];
                if (!job) return "";
                // Use pickup_location and city (no business name) for accuracy
                const addr = job.pickup_location;
                const city = job.city || "Brandon";
                const key = `${addr}, ${city}`;
                if (seenLocs.has(key)) return "";
                seenLocs.add(key);
                stopsAdded++;
                return encodeURIComponent(key);
            }).filter(w => w !== "").join("|");

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = `intent://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
            } else {
                window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
            }
        }

        // ---------- PWA INSTALL ----------
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
                document.getElementById('install-btn').style.display = 'none';
            }
        });

        // ---------- UTILS ----------
        function formatTime12(ts) { /* not used but kept for consistency */ }
    </script>
</body>
