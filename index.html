<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E&C Route Planner</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="gold">
  <!-- Fonts & styles (blend of command/driver) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300&display=swap" rel="stylesheet">
  <style>
    /* Base & variables from command.html, adapted */
    :root {
      --accent: #facc15; --bg: #111827; --card: #1f2937; --text: #f9fafb;
      --header-bg: #030712; --input-bg: #374151; --border: #4b5563;
      --shadow-soft: 0 10px 15px -3px rgba(0,0,0,0.3);
      --active-green: #22c55e;
    }
    body.light-mode {
      --bg: #f3f4f6; --card: #ffffff; --text: #111827; --header-bg: #ffffff;
      --input-bg: #f9fafb; --border: #e5e7eb; --accent: #2563eb;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 12px 24px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); }
    .header-logo { height: 28px; width: auto; margin-right: 12px; vertical-align: middle; filter: drop-shadow(0 0 3px var(--accent)); }
    .shiny-text { background: linear-gradient(to right, var(--accent) 20%, #ccc 50%, var(--accent) 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: text-shine 3s linear infinite; }
    @keyframes text-shine { to { background-position: 200% center; } }
    #route-btn { background: #000; border: 1px solid var(--accent); color: var(--active-green); font-weight: 700; cursor: pointer; border-radius: 6px; padding: 8px 16px; font-size: 14px; text-transform: uppercase; box-shadow: var(--shadow-soft); }
    #main-panel { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .input-group { margin-bottom: 20px; }
    .input-wrap { position: relative; width: 100%; margin-bottom: 15px; }
    input, select { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    input:focus { border-color: var(--accent); outline: none; }
    .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
    .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text); }
    .suggestion-item:hover { background: var(--accent); color: #000; }
    .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; }
    .stop-list { background: var(--card); border-radius: 8px; padding: 15px; border: 1px solid var(--border); }
    .stop-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 16px; display: flex; align-items: center; }
    .stop-number { background: var(--accent); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 15px; flex-shrink: 0; }
    .stop-info { flex: 1; }
    .stop-name { font-weight: 600; }
    .stop-address { color: #aaa; font-size: 14px; }
    /* Map modal (copied from command) */
    #map-modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: #000; }
    #map { width: 100%; height: 100%; }
    .close-map { position: fixed; top: 20px; right: 20px; z-index: 3005; background: #b71c1c; color: #fff; border: none; width: 120px; height: 40px; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .driver-map-label { color: #00ff00 !important; font-weight: 700; text-shadow: 0 0 2px #000; }
    /* Login overlay */
    #login-overlay { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 90%; max-width: 350px; background: #111; padding: 40px; border-radius: 12px; border: 1px solid #222; text-align: center; }
    .login-input { width: 100%; padding: 14px; margin: 12px 0; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; }
    .login-submit { width: 100%; padding: 14px; background: var(--accent); border: none; color: #000; font-weight: 700; border-radius: 6px; cursor: pointer; }
    /* Install button */
    #install-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: #2563eb; color: #fff; border: none; padding: 14px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; z-index: 1002; }
    /* Responsive */
    @media (max-width: 600px) { header { padding: 8px 16px; } .header-logo { height: 20px; } #route-btn { padding: 6px 12px; font-size: 12px; } }
  </style>
</head>
<body>
  <!-- LOGIN OVERLAY (exact from command) -->
  <div id="login-overlay">
    <div class="login-box">
      <h2 style="color:var(--accent); margin-top:0;">ROUTE PLANNER</h2>
      <input type="email" id="login-user" class="login-input" placeholder="Email" autofocus>
      <input type="password" id="login-pin" class="login-input" placeholder="Password">
      <button class="login-submit" onclick="attemptLogin()">Authorize</button>
    </div>
  </div>

  <!-- HEADER (command style, with Route button) -->
  <header>
    <div style="display: flex; align-items: center;">
      <img src="icon2.png" class="header-logo" alt="E&C Logo">
      <span class="shiny-text" style="font-size:18px; font-weight:700;">E&C ROUTE PLANNER</span>
    </div>
    <button id="route-btn" onclick="openRouteMap()">ROUTE</button>
  </header>

  <!-- MAIN PANEL: input fields + stop list -->
  <div id="main-panel">
    <div class="input-group">
      <!-- Contact Name with autocomplete from addressData -->
      <div class="input-wrap" style="position:relative;">
        <input type="text" id="contact-name" placeholder="Contact Name (e.g. Business)" autocomplete="off" oninput="handleNameInput(this.value)">
        <div id="name-suggestions" class="suggestions-box"></div>
      </div>
      <!-- Contact Address with Google Places autocomplete -->
      <div class="input-wrap">
        <input type="text" id="contact-address" placeholder="Street address, city" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="addStop()">ADD STOP</button>
    </div>

    <!-- Optimized Stop List -->
    <div class="stop-list" id="stop-list-container">
      <h3 style="margin-top:0; color:var(--accent);">OPTIMIZED STOPS</h3>
      <div id="stop-list"></div>
      <div id="empty-message" style="color:#777; text-align:center; padding:20px;">No stops added yet.</div>
    </div>
  </div>

  <!-- MAP MODAL (full screen) -->
  <div id="map-modal">
    <button class="close-map" onclick="closeMap()">CLOSE MAP</button>
    <div id="map"></div>
  </div>

  <!-- PWA INSTALL BUTTON -->
  <button id="install-btn">Install App</button>

  <!-- Firebase & Google Maps -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI&libraries=places,geometry&callback=initMap" async defer></script>

  <script>
    // ---------- Firebase Config (same as command/driver) ----------
    firebase.initializeApp({
      apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
      authDomain: "eandccourier-36fcc.firebaseapp.com",
      databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
      projectId: "eandccourier-36fcc",
      messagingSenderId: "1067680083511",
      appId: "1:1067680083511:android:22d1eb3757302492bd19b2"
    });
    const db = firebase.database();

    // ---------- Global Variables ----------
    let currentUser = null;
    let addressData = {};          // from /address_lookup
    let stops = {};                // raw stops from /developer/routePlanner/stops
    let stopsArray = [];           // array of {id, name, address, lat, lng, ...}
    let optimizedOrder = [];       // ordered stop ids
    let map, directionsService, directionsRenderer, mapMarkers = [], mapPolyline = null;
    const depotAddress = "1604 Moreland Ave, Brandon MB";  // fixed origin/destination
    const ROUTES_API_KEY = "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI";

    // ---------- Login (same as command, but no role check) ----------
    window.attemptLogin = function() {
      const email = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pin').value.trim();
      if (!email || !pass) return;
      firebase.auth().signInWithEmailAndPassword(email, pass)
        .catch(err => alert("Login failed: " + err.message));
    };

    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user.email.split('@')[0].toLowerCase();
        document.getElementById('login-overlay').style.display = 'none';
        // Load address data for autocomplete
        db.ref('address_lookup').on('value', snap => addressData = snap.val() || {});
        // Listen to stops under isolated path
        db.ref('developer/routePlanner/stops').on('value', snap => {
          stops = snap.val() || {};
          stopsArray = Object.entries(stops).map(([id, s]) => ({ id, ...s }));
          if (stopsArray.length === 0) {
            document.getElementById('empty-message').style.display = 'block';
            document.getElementById('stop-list').innerHTML = '';
            optimizedOrder = [];
          } else {
            document.getElementById('empty-message').style.display = 'none';
            optimizeAndRenderStops();
          }
        });
      } else {
        document.getElementById('login-overlay').style.display = 'flex';
      }
    });

    // ---------- Address Autocomplete for Name (from addressData) ----------
    window.handleNameInput = function(val) {
      const suggestionsDiv = document.getElementById('name-suggestions');
      if (val.length < 1) { suggestionsDiv.style.display = 'none'; return; }
      const matches = Object.keys(addressData).filter(key =>
        key.toLowerCase().startsWith(val.trim().toLowerCase())
      );
      if (matches.length === 0) { suggestionsDiv.style.display = 'none'; return; }
      suggestionsDiv.innerHTML = matches.map(name =>
        `<div class="suggestion-item" onclick="selectName('${name.replace(/'/g, "\\'")}')">${name}</div>`
      ).join('');
      suggestionsDiv.style.display = 'block';
    };

    window.selectName = function(name) {
      document.getElementById('contact-name').value = name;
      document.getElementById('name-suggestions').style.display = 'none';
      // Optionally fill address from addressData? We'll just leave address empty, user can type.
    };

    // ---------- Google Places Autocomplete for address ----------
    function initPlaces() {
      const addrInput = document.getElementById('contact-address');
      if (!addrInput) return;
      const autocomplete = new google.maps.places.Autocomplete(addrInput, {
        componentRestrictions: { country: 'ca' },
        fields: ['address_components', 'formatted_address', 'geometry', 'name']
      });
      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;
        // Keep the formatted address in input
      });
    }
    window.initMap = function() {
      // Called when Maps API loads, but we also need to init map later.
      if (typeof google !== 'undefined' && google.maps) {
        initPlaces();
      }
    };

    // ---------- Add Stop (push to Firebase) ----------
    window.addStop = function() {
      const name = document.getElementById('contact-name').value.trim();
      const address = document.getElementById('contact-address').value.trim();
      if (!name || !address) { alert('Please enter both name and address'); return; }

      // Geocode address to get lat/lng (optional but recommended for route accuracy)
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: address }, (results, status) => {
        let lat = null, lng = null;
        if (status === 'OK' && results[0]) {
          lat = results[0].geometry.location.lat();
          lng = results[0].geometry.location.lng();
        } else {
          console.warn('Geocoding failed, proceeding without coordinates');
        }
        // Push to Firebase under isolated path
        const newStopRef = db.ref('developer/routePlanner/stops').push();
        newStopRef.set({
          name: name,
          address: address,
          lat: lat,
          lng: lng,
          added_by: currentUser,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          document.getElementById('contact-name').value = '';
          document.getElementById('contact-address').value = '';
        });
      });
    };

    // ---------- Optimize using Routes API (like driver.html) ----------
    async function optimizeAndRenderStops() {
      if (stopsArray.length === 0) return;
      // Build list of addresses for waypoints
      const waypoints = stopsArray.map(s => s.address);
      const origin = depotAddress;
      const destination = depotAddress;

      try {
        const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Goog-Api-Key": ROUTES_API_KEY,
            "X-Goog-FieldMask": "routes.optimizedIntermediateWaypointIndex,routes.polyline.encodedPolyline,routes.legs"
          },
          body: JSON.stringify({
            origin: { address: origin },
            destination: { address: destination },
            intermediates: waypoints.map(addr => ({ address: addr })),
            travelMode: "DRIVE",
            optimizeWaypointOrder: true
          })
        });
        const data = await response.json();
        if (data.routes && data.routes[0]) {
          const orderIndices = data.routes[0].optimizedIntermediateWaypointIndex || [];
          // Reorder stopsArray according to indices
          const orderedStops = orderIndices.map(idx => stopsArray[idx]);
          optimizedOrder = orderedStops.map(s => s.id);
          // Also store polyline for map
          if (data.routes[0].polyline) {
            const encodedPolyline = data.routes[0].polyline.encodedPolyline;
            window.currentRoutePolyline = encodedPolyline;
          }
          renderStopList(orderedStops);
        } else {
          // Fallback to original order
          optimizedOrder = stopsArray.map(s => s.id);
          renderStopList(stopsArray);
        }
      } catch (e) {
        console.error("Routes API error", e);
        optimizedOrder = stopsArray.map(s => s.id);
        renderStopList(stopsArray);
      }
    }

    function renderStopList(orderedStops) {
      const container = document.getElementById('stop-list');
      let html = '';
      orderedStops.forEach((stop, index) => {
        html += `
          <div class="stop-item">
            <div class="stop-number">${index+1}</div>
            <div class="stop-info">
              <div class="stop-name">${stop.name}</div>
              <div class="stop-address">${stop.address}</div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // ---------- Map Display (Route button) ----------
    window.openRouteMap = function() {
      if (optimizedOrder.length === 0) { alert('No stops to display.'); return; }
      const modal = document.getElementById('map-modal');
      modal.style.display = 'block';
      // Ensure map initialized
      if (!map) {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 49.8425, lng: -99.9497 },
          zoom: 12,
          gestureHandling: 'greedy',
          styles: [{"featureType":"all","elementType":"all","stylers":[{"invert_lightness":true},{"saturation":10},{"lightness":30},{"gamma":0.5},{"hue":"#435158"}]}]
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
          map: map,
          suppressMarkers: true,
          preserveViewport: true,
          polylineOptions: { strokeColor: "#00d4ff", strokeWeight: 6 }
        });
      }
      // Build request using optimized order
      const waypoints = optimizedOrder.map(id => {
        const stop = stops[id];
        return { location: stop.address, stopover: true };
      });
      directionsService.route({
        origin: depotAddress,
        destination: depotAddress,
        waypoints: waypoints,
        optimizeWaypoint: false, // already optimized
        travelMode: 'DRIVING'
      }, (response, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(response);
          // Add custom markers with labels (contact name)
          const route = response.routes[0];
          const legs = route.legs;
          // Clear old markers
          mapMarkers.forEach(m => m.setMap(null));
          mapMarkers = [];
          legs.forEach((leg, i) => {
            const stop = stops[optimizedOrder[i]];
            if (leg.end_location) {
              const marker = new google.maps.Marker({
                position: leg.end_location,
                map: map,
                label: {
                  text: stop.name,
                  color: '#00ff00',
                  fontSize: '14px',
                  fontWeight: 'bold',
                  className: 'driver-map-label'
                },
                icon: {
                  path: google.maps.SymbolPath.CIRCLE,
                  scale: 10,
                  fillColor: '#facc15',
                  fillOpacity: 1,
                  strokeWeight: 2,
                  strokeColor: '#fff'
                }
              });
              mapMarkers.push(marker);
            }
          });
        } else {
          alert('Directions failed: ' + status);
        }
      });
    };

    window.closeMap = function() {
      document.getElementById('map-modal').style.display = 'none';
    };

    // ---------- PWA Install ----------
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-btn').style.display = 'block';
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') deferredPrompt = null;
        document.getElementById('install-btn').style.display = 'none';
      }
    });

    // ---------- Helper: click outside suggestions ----------
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.input-wrap')) {
        document.getElementById('name-suggestions').style.display = 'none';
      }
    });

    // ---------- Load addressData early ----------
    db.ref('address_lookup').on('value', snap => addressData = snap.val() || {});
  </script>
</body>
</html>
