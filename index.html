<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E&C ROUTE PLANNER</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="gold">
    <link href="//fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Combined and simplified CSS from both files */
        :root {
            --accent: #facc15; --bg: #111827; --card: #1f2937; --text: #f9fafb; --card-text: #e5e7eb;
            --active-green: #22c55e; --archive-orange: #f97316; --note-blue: #3b82f6; --pro-blue: #2563eb;
            --header-bg: #030712; --input-bg: #374151; --border: #4b5563; --modal-bg: #111827;
            --shadow-soft: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -4px rgba(0,0,0,0.3);
        }
        body.light-mode {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --card-text: #374151; --header-bg: #ffffff;
            --input-bg: #f9fafb; --border: #e5e7eb; --modal-bg: #ffffff; --accent: #2563eb; --active-green: #16a34a;
        }
        body.light-mode * { color: #000 !important; }
        body.light-mode button { background: #fff !important; color: #000 !important; border: 1px solid #ccc !important; }
        body.light-mode .primary { background: #fff !important; border: 2px solid #00b32d !important; }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { padding: 16px 24px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); }
        .header-logo { height: 24px; width: auto; margin-right: 12px; vertical-align: middle; filter: drop-shadow(0 0 3px var(--accent)); cursor: pointer; }
        .shiny-text { background: linear-gradient(to right, var(--accent) 20%, #ccc 50%, var(--accent) 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: text-shine 3s linear infinite; }
        @keyframes text-shine { to { background-position: 200% center; } }

        #login-overlay { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 100%; max-width: 350px; background: #111; padding: 40px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .login-input { width: 100%; padding: 14px; margin: 12px 0; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 16px; outline: none; }
        .login-submit { width: 100%; padding: 14px; margin-top: 20px; background: var(--accent); border: none; color: #000; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        .flex-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .input-wrap { position: relative; flex: 1; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(250,204,21,0.2); }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); z-index: 5000; max-height: 200px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--text); }
        .suggestion-item:hover { background: var(--accent); color: #000; }
        .suggestion-reset { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 9px; font-weight: 700; cursor: pointer; color: #666; text-transform: uppercase; z-index: 10; }

        #map-modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: #000; }
        #map { width: 100%; height: 100%; }
        .close-map { position: fixed; top: 20px; right: 20px; z-index: 3005; background: #b71c1c; color: #fff; border: none; width: 140px; height: 40px; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #zoom-out-btn { top: 70px; background: #448800; }
        #reset-driver-view-btn { position: absolute; bottom: 20px; left: 20px; z-index: 3005; background: #222; color: #fff; border: 1px solid #fff; border-radius: 6px; padding: 8px 12px; font-weight: 700; cursor: pointer; display: none; }

        .primary { padding: 14px 16px; background: var(--btn-bg, #374151); color: var(--text); font-weight: 700; border: 1px solid var(--border); border-bottom: 3px solid var(--accent); cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .btn-add { background: var(--active-green); color: #000; border: none; padding: 14px 24px; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-clear { background: #b71c1c; color: #fff; border: none; padding: 8px 16px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-save { background: #2563eb; color: #fff; border: none; padding: 8px 16px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-delete-all-saved { background: #f97316; color: #fff; border: none; padding: 8px 16px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        #job-list-container { background: var(--card); border-radius: 12px; padding: 15px; margin: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
        #job-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .job-item { display: flex; align-items: center; gap: 12px; background: var(--input-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: grab; user-select: none; -webkit-user-select: none; position: relative; }
        .job-item.sortable-ghost { opacity: 0.4; background: var(--accent); }
        .job-number { background: #fff; color: #000; font-weight: 900; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .job-info { flex: 1; overflow: hidden; }
        .job-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .job-address { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star-icon { width: 24px; height: 24px; cursor: pointer; fill: none; stroke: var(--accent); stroke-width: 2; z-index: 2; }
        .star-icon.active { fill: var(--accent); }
        .delete-icon { width: 20px; height: 20px; cursor: pointer; fill: #b71c1c; z-index: 2; }

        #install-btn { display: none; background: var(--pro-blue); color: #fff; border: none; padding: 14px 16px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; position: fixed; right: 15px; bottom: 15px; z-index: 1002; }

        /* Map button styles */
        .map-btn {
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 4px, transparent 4px, transparent 8px), #2c3e50;
            color: white;
            border: 1px solid #fff;
            padding: 6px 8px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            line-height: 1;
            min-width: 36px;
            min-height: 36px;
        }
        .map-btn-glow {
            box-shadow: 0 0 15px var(--accent);
        }

        /* Driver map label style (from command.html) */
        .driver-map-label { color: #00ff00 !important; font-weight: 700; text-shadow: 0 0 2px #000; }

        /* ETA glow */
        .eta-glow {
            border-color: #00bfff !important;
            box-shadow: 0 0 15px #00bfff;
        }

        /* ---------- NEW STYLES FOR BULLSEYE, DONE OVERLAY, CHECKMARK ---------- */
        /* Bullseye button */
        .bullseye-btn {
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            outline: none;
            margin: 0 0 8px 0; /* spacing above default controls */
        }
        .bullseye-btn.active {
            border-color: #ff6600;
            background: #ffcc00;
        }

        /* Done overlay for list items (removed but keep old styles for possible references) */
        .done-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 10;
            cursor: default;
        }
        .done-overlay .done-btn {
            background: #fff;
            border: 3px solid #00aa00;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #000;
        }
        .done-overlay .checkmark-svg {
            width: 60px;
            height: 60px;
        }
        .done-overlay .checkmark-path {
            stroke: #00aa00;
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw-check 1.5s forwards;
        }
        @keyframes draw-check {
            to { stroke-dashoffset: 0; }
        }
        /* New styles for Details button inside overlay (no longer used) */
        .done-overlay .details-btn {
            background: #fff;
            border: 3px solid #3b82f6;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #000;
        }
        .done-overlay .details-btn.open {
            background: #3b82f6;
            color: #fff;
        }
        .done-overlay {
            gap: 10px;
            justify-content: center;
        }

        /* Details dropdown (old) - keep for reference but not used */
        .details-dropdown {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 4px 0 8px 0;
            display: block;
        }
        .details-dropdown textarea {
            width: 100%;
            padding: 8px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        .details-dropdown .details-close-btn {
            margin-top: 8px;
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Saved routes pills container */
        #saved-routes-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .saved-route-pill {
            background: gold;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #b8860b;
            transition: background 0.2s;
        }
        .saved-route-pill:hover {
            background: #ffd700;
        }
        .saved-route-pill.loading {
            opacity: 0.6;
        }

        /* Share button bottom right */
        #share-btn-bottom {
            position: fixed;
            bottom: 80px;
            right: 15px;
            z-index: 1001;
            background: #2c3e50;
            border: 1px solid #fff;
            padding: 10px;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #install-btn {
            bottom: 15px; /* keep as is */
        }

        /* InfoWindow button style - modified to transparent background */
        .done-infowindow-btn {
            border: 3px solid #00aa00;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            background: transparent;
            color: #000;
            display: inline-block;
        }
        .done-infowindow-btn:active {
            background: rgba(0,0,0,0.1);
        }
        .gm-style .gm-style-iw-c {
            padding: 10px !important;
            background: transparent !important;
            box-shadow: none !important;
        }
        .gm-style .gm-style-iw-d {
            overflow: hidden !important;
            background: transparent !important;
        }
        /* Hide the default close button (x) */
        .gm-style-iw button[title="Close"] {
            display: none !important;
        }

        /* ETA button spin */
        .eta-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Date modal */
        #date-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9998;
            align-items: center;
            justify-content: center;
        }
        #date-modal .date-box {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border);
        }
        #date-modal .date-box input[type="date"] {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            margin: 16px 0;
        }
        #date-modal .date-box .date-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        #date-modal .date-box button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        #date-modal .date-box .confirm-date {
            background: var(--accent);
            color: #000;
        }
        #date-modal .date-box .cancel-date {
            background: #666;
            color: #fff;
        }

        /* ---- Address Picker Modal styles ---- */
        #address-picker-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #111;
        }
        #address-picker-modal .picker-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0,0,0,0.7);
            padding: 10px 16px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
        #address-picker-modal .picker-header input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        #address-picker-modal .picker-header input:focus {
            border-color: var(--accent);
        }
        #address-picker-modal .picker-close {
            background: #b71c1c;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        #address-picker-modal .picker-map {
            width: 100%;
            height: 100%;
        }
        #address-picker-modal .picker-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            text-align: center;
            max-width: 90%;
            backdrop-filter: blur(4px);
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            z-index: 10;
            min-width: 200px;
        }
        #address-picker-modal .picker-info .addr-detail {
            font-size: 14px;
            word-break: break-word;
        }
        #address-picker-modal .picker-info .plus-code {
            font-size: 12px;
            color: #aaa;
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #555;
        }
        #address-picker-modal .picker-info .picker-confirm {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        /* pin button inside address input */
        .address-pin-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
            line-height: 1;
        }
        .address-pin-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--accent);
            stroke: #333;
            stroke-width: 1;
        }
        .address-pin-btn:hover {
            opacity: 0.8;
        }

        /* ---------- NEW STYLES FOR DETAILS MODAL ---------- */
        #details-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 6000;
            background: rgba(0,0,0,0.75);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #details-modal .details-modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 30px 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 30px rgba(59,130,246,0.7);
            animation: pulseGlow 1.5s infinite alternate;
            position: relative;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(59,130,246,0.5); border-color: #3b82f6; }
            100% { box-shadow: 0 0 50px rgba(59,130,246,0.9); border-color: #60a5fa; }
        }
        #details-modal .details-modal-content .stop-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin: 0 0 20px 0;
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
        }
        #details-modal .detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            font-size: 24px;
        }
        #details-modal .detail-row:last-of-type {
            border-bottom: none;
        }
        #details-modal .detail-row .category-label {
            font-weight: 600;
            min-width: 120px;
            color: var(--text);
        }
        #details-modal .detail-row .qty-controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        #details-modal .detail-row .qty-controls button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #details-modal .detail-row .qty-controls button:active {
            background: #e5b800;
        }
        #details-modal .detail-row .qty-controls .qty-display {
            font-size: 32px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            color: var(--text);
        }
        #details-modal .detail-row .other-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 24px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 0;
        }
        #details-modal .detail-row .other-input:focus {
            border-color: var(--accent);
            outline: none;
        }
        /* Weight row specific */
        #details-modal .detail-row .weight-input {
            width: 120px;
            padding: 12px 16px;
            font-size: 24px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }
        #details-modal .detail-row .weight-input:focus {
            border-color: var(--accent);
            outline: none;
        }
        #details-modal .detail-row .weight-label {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-left: 8px;
        }
        #details-modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }
        #details-modal .modal-actions button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        #details-modal .modal-actions .save-details-btn {
            background: var(--accent);
            color: #000;
        }
        #details-modal .modal-actions .close-details-btn {
            background: #666;
            color: #fff;
        }
        @media (max-width: 768px) {
            #details-modal .details-modal-content {
                padding: 20px;
                max-width: 100%;
            }
            #details-modal .detail-row {
                font-size: 20px;
                flex-wrap: wrap;
                gap: 10px;
            }
            #details-modal .detail-row .category-label {
                min-width: 80px;
            }
            #details-modal .detail-row .qty-controls button {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
            #details-modal .detail-row .qty-controls .qty-display {
                font-size: 28px;
                min-width: 40px;
            }
            #details-modal .detail-row .other-input {
                font-size: 20px;
            }
            #details-modal .detail-row .weight-input {
                width: 100px;
                font-size: 20px;
            }
            #details-modal .detail-row .weight-label {
                font-size: 20px;
            }
            #details-modal .modal-actions button {
                font-size: 18px;
                padding: 12px 24px;
            }
        }

        @media (max-width: 768px) {
            header { padding: 8px 12px; }
            .header-logo { height: 20px; }
            #address-picker-modal .picker-header { flex-wrap: wrap; }

    <script>
        // Firebase config (same as original)
        firebase.initializeApp({
            apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
            authDomain: "eandccourier-36fcc.firebaseapp.com",
            databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
            projectId: "eandccourier-36fcc",
            messagingSenderId: "1067680083511",
            appId: "1:1067680083511:android:22d1eb3757302492bd19b2"
        });
        const auth = firebase.auth();
        const db = firebase.database();

        // Global variables
        let currentUser = null;
        let jobs = {};              // All jobs under developer/route_planner/jobs
        let manualOrder = [];        // Array of job IDs in current order (from Firebase)
        let optimizedOrder = [];     // Array of job IDs after route optimization
        let addressData = {};        // From address_lookup
        let map, mainMap, mapMarkers = {}, activePolyline = null, mapBoundsInitialized = false;
        let autocompleteAddress;     // Google Places Autocomplete for address field
        let etaTotalMinutes = 0;
        let etaTotalKm = 0;

        // New globals for tracking and overlays
        let isTracking = false;
        let userMarker = null;
        let userCircle = null;
        let locationWatchId = null;
        let activeInfoWindow = null;

        // Global for ETA calculation status
        let etaCalculating = false;

        // Global for details modal
        let currentDetailsJobId = null;
        let detailsData = {};

        // Global for date selection
        let pendingShareDate = null;

        // Theme handling (copied from command.html)
        if (localStorage.getItem('ec_theme') === 'light') document.body.classList.add('light-mode');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('ec_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            if (map) map.setOptions({ styles: document.body.classList.contains('light-mode') ? [] : mapStyles });
        }

        // Map styles (from command.html)
        const mapStyles = [{"featureType":"all","elementType":"all","stylers":[{"invert_lightness":!0},{"saturation":10},{"lightness":30},{"gamma":0.5},{"hue":"#435158"}]}];

        // ---------- LOGIN (copied from command.html) ----------
        function attemptLogin() {
            const email = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pin').value.trim();
            if (!email || !pass) return;
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => auth.signInWithEmailAndPassword(email, pass))
                .catch(err => alert("Login Failed: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email;
                const username = email.split('@')[0].toLowerCase();
                db.ref(`roles/${username}/command`).once('value').then(snap => {
                    if (snap.val() === true) {
                        currentUser = username;
                        document.getElementById('login-overlay').style.display = 'none';
                        // Removed user-display line
                        initApp();
                    } else {
                        alert("ACCESS DENIED");
                        auth.signOut();
                        document.getElementById('login-overlay').style.display = 'flex';
                    }
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        // ---------- DATA LISTENERS (under /developer/route_planner) ----------
        function initApp() {
            // Listen for address_lookup (shared data, no change)
            db.ref('address_lookup').on('value', snap => { addressData = snap.val() || {}; });

            // Listen for jobs under developer/route_planner/jobs
            db.ref('developer/route_planner/jobs').on('value', snap => {
                jobs = snap.val() || {};
                updateRoute();  // Re-optimize and render
            });

            // Listen for manual order
            db.ref('developer/route_planner/manual_order').on('value', snap => {
                manualOrder = snap.val() || [];
                updateRoute();  // Re-optimize with new order
            });

            // Listen for saved routes
            db.ref('developer/route_planner/saved_routes').on('value', snap => {
                renderSavedPills(snap.val() || {});
            });

            // Initialize Places Autocomplete on address field
            initPlaces();
        }

        // ---------- ADDRESS AUTOCOMPLETE (from command.html) ----------
        function handleNameInput(val) {
            showSuggestions(val, 'suggestions', name => `<div class="suggestion-item" onclick="selectClient('${name.replace(/'/g, "\\'")}')">${name}</div>`);
        }
        function handleCityInput(val) {
            showSuggestions(val, 'city-suggestions', city => `<div class="suggestion-item" onclick="selectCity('${city.replace(/'/g, "\\'")}')">${city} (${addressData[city]?.city})</div>`);
        }
        function showSuggestions(val, elementId, htmlCallback) {
            const box = document.getElementById(elementId);
            if (val.length < 1) { box.style.display = 'none'; return; }
            const matches = Object.keys(addressData).filter(key => key.toLowerCase().startsWith(val.toLowerCase().trim()));
            if (matches.length === 0) { box.style.display = 'none'; return; }
            box.innerHTML = matches.map(htmlCallback).join('');
            box.style.display = 'block';
        }
        function selectClient(name) {
            const data = addressData[name];
            if (!data) return;
            document.getElementById('f-name').value = name;
            document.getElementById('f-address').value = data.address || '';
            document.getElementById('f-city').value = data.city || '';
            document.getElementById('suggestions').style.display = 'none';
        }
        function selectCity(city) {
            document.getElementById('f-city').value = city;
            document.getElementById('city-suggestions').style.display = 'none';
        }
        function resetFormFields() {
            document.getElementById('f-name').value = '';
            document.getElementById('f-address').value = '';
            document.getElementById('f-city').value = '';
        }

        // Google Places Autocomplete (copied from command.html)
        function initPlaces() {
            const addressInput = document.getElementById('f-address');
            if (!addressInput) return;
            const options = {
                componentRestrictions: { country: 'ca' },
                bounds: new google.maps.Circle({ center: new google.maps.LatLng(49.848, -99.950), radius: 50000 }).getBounds(),
                strictBounds: false
            };
            autocompleteAddress = new google.maps.places.Autocomplete(addressInput, options);
            autocompleteAddress.addListener('place_changed', () => {
                const place = autocompleteAddress.getPlace();
                if (!place.address_components) return;
                // Extract city
                for (let comp of place.address_components) {
                    if (comp.types.includes('locality')) {
                        document.getElementById('f-city').value = comp.long_name;
                        break;
                    }
                }
            });
        }

        // ---------- JOB MANAGEMENT ----------
        function addJob() {
            const name = document.getElementById('f-name').value.trim();
            const address = document.getElementById('f-address').value.trim();
            const city = document.getElementById('f-city').value.trim();
            if (!name || !address || !city) {
                alert("Please fill in all fields.");
                return;
            }
            const newJob = {
                name: name,
                pickup_location: address,
                city: city,
                status: 'pending_pickup',
                timestamp: Date.now(),
                created_by: currentUser,
                manual_priority: false,
                box_qty: 0,
                piece_qty: 0,
                envelope_qty: 0,
                skid_qty: 0,
                weight_lbs: 0,
                other_details: ''
            };
            // Push job to Firebase
            const newJobRef = db.ref('developer/route_planner/jobs').push();
            newJobRef.set(newJob).then(() => {
                // After job is saved, update address_lookup
                const sanitizedKey = name.replace(/[.#$\[\]\/]/g, "").trim();
                const updateObj = {
                    address: address,
                    city: city,
                    last_edit_by: currentUser
                };
                db.ref("address_lookup").child(sanitizedKey).update(updateObj);
                resetFormFields();
            }).catch(err => alert("Error adding job: " + err.message));
        }

        function deleteJob(id) {
            if (confirm("Remove this job from route?")) {
                db.ref(`developer/route_planner/jobs/${id}`).remove();
            }
        }

        function clearAllJobs() {
            if (confirm("Clear all jobs?")) {
                db.ref('developer/route_planner/jobs').remove();
                document.getElementById('eta-display').style.display = 'none';
                document.getElementById('eta-display').classList.remove('eta-glow');
                document.getElementById('stop-counter').style.display = 'none';
                etaTotalMinutes = 0;
                etaTotalKm = 0;
            }
        }

        function togglePriority(id, current) {
            const newVal = !current;
            db.ref(`developer/route_planner/jobs/${id}/manual_priority`).set(newVal);
            // No need to update manualOrder here; the route will reorder based on flags and existing manualOrder.
        }

        // ---------- ROUTE OPTIMIZATION (adapted from driver.html's updateRoute) ----------
        async function updateRoute() {
            if (!jobs) return;

            // Filter only pending_pickup jobs (all jobs in this app)
            const pendingJobs = Object.entries(jobs)
                .filter(([id, job]) => job.status === 'pending_pickup')
                .map(([id, job]) => ({ id, ...job }));

            if (pendingJobs.length === 0) {
                optimizedOrder = [];
                renderList();
                if (activePolyline) activePolyline.setMap(null);
                if (mapMarkers) Object.values(mapMarkers).forEach(m => m.setMap(null));
                mapMarkers = {};
                // Remove glow from map button
                const mapBtn = document.getElementById('map-btn');
                if (mapBtn) mapBtn.classList.remove('map-btn-glow');
                // Do not hide ETA display automatically; it will be hidden if etaTotalMinutes is 0
                document.getElementById('stop-counter').style.display = 'none';
                // If etaTotalMinutes is 0, hide display
                if (etaTotalMinutes === 0) {
                    document.getElementById('eta-display').style.display = 'none';
                    document.getElementById('eta-display').classList.remove('eta-glow');
                }
                return;
            }

            // Group jobs by identical address + city
            const groups = [];
            const groupMap = new Map();
            pendingJobs.forEach(job => {
                const key = `${job.pickup_location}, ${job.city}`.toLowerCase();
                if (!groupMap.has(key)) {
                    groupMap.set(key, { key, jobs: [], addrString: `${job.pickup_location}, ${job.city}` });
                }
                groupMap.get(key).jobs.push(job);
            });
            groupMap.forEach(group => groups.push(group));

            // Separate priority groups (any job in group has manual_priority true)
            const priorityGroups = [];
            const normalGroups = [];
            groups.forEach(group => {
                if (group.jobs.some(j => j.manual_priority)) priorityGroups.push(group);
                else normalGroups.push(group);
            });

            // Sort priority groups by their order in manualOrder
            priorityGroups.sort((a, b) => {
                const aId = a.jobs[0].id;
                const bId = b.jobs[0].id;
                const idxA = manualOrder.indexOf(aId);
                const idxB = manualOrder.indexOf(bId);
                return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
            });

            let orderedNormalGroups = normalGroups;
            if (normalGroups.length > 1) {
                // Determine origin for normal group optimization
                // If there are priority groups, start from the last priority group's address; otherwise start from depot
                let originAddress;
                if (priorityGroups.length > 0) {
                    // Last priority group's address
                    originAddress = priorityGroups[priorityGroups.length - 1].addrString;
                } else {
                    originAddress = "1604 Moreland Ave, Brandon MB"; // depot
                }
                const destinationAddress = "1604 Moreland Ave, Brandon MB"; // depot

                try {
                    const origin = { address: originAddress };
                    const destination = { address: destinationAddress };
                    const waypoints = normalGroups.map(g => ({ address: g.addrString }));
                    const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI",
                            "X-Goog-FieldMask": "routes.optimizedIntermediateWaypointIndex"
                        },
                        body: JSON.stringify({
                            origin: origin,
                            destination: destination,
                            intermediates: waypoints,
                            travelMode: "DRIVE",
                            optimizeWaypointOrder: true
                        })
                    });
                    const data = await response.json();
                    if (data.routes && data.routes[0] && data.routes[0].optimizedIntermediateWaypointIndex) {
                        const indices = data.routes[0].optimizedIntermediateWaypointIndex;
                        orderedNormalGroups = indices.map(idx => normalGroups[idx]);
                    }
                } catch (e) {
                    console.warn("Optimization failed, using original order", e);
                }
            }

            const finalGroups = priorityGroups.concat(orderedNormalGroups);

            // Build optimizedOrder from finalGroups
            optimizedOrder = [];
            finalGroups.forEach(group => {
                group.jobs.forEach(job => optimizedOrder.push(job.id));
            });

            // Now compute full route with segmentation for >25 stops (but do NOT update etaTotalMinutes/Km here)
            // We only compute polyline and markers; ETA is calculated on-demand.
            try {
                const depotAddress = "1604 Moreland Ave, Brandon MB";
                const maxIntermediates = 25;
                const totalGroups = finalGroups.length;
                let segments = [];
                let start = 0;
                while (start < totalGroups) {
                    let end = Math.min(start + maxIntermediates, totalGroups);
                    let segmentGroups = finalGroups.slice(start, end);
                    let originAddr = (start === 0) ? depotAddress : finalGroups[start - 1].addrString;
                    let destAddr, intermediates;
                    if (end === totalGroups) {
                        destAddr = depotAddress;
                        intermediates = segmentGroups.map(g => g.addrString);
                    } else {
                        destAddr = segmentGroups[segmentGroups.length - 1].addrString;
                        intermediates = segmentGroups.slice(0, -1).map(g => g.addrString);
                    }
                    segments.push({ originAddr, destAddr, intermediates, segmentGroups });
                    start = end;
                }

                let combinedPath = [];

                for (let seg of segments) {
                    const origin = { address: seg.originAddr };
                    const destination = { address: seg.destAddr };
                    const waypoints = seg.intermediates.map(addr => ({ address: addr }));
                    const requestBody = {
                        origin: origin,
                        destination: destination,
                        intermediates: waypoints,
                        travelMode: "DRIVE",
                        optimizeWaypointOrder: false
                    };
                    const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI",
                            "X-Goog-FieldMask": "routes.polyline.encodedPolyline,routes.legs.endLocation"
                        },
                        body: JSON.stringify(requestBody)
                    });
                    const result = await response.json();
                    if (result.routes && result.routes[0]) {
                        const route = result.routes[0];
                        if (route.polyline) {
                            const path = google.maps.geometry.encoding.decodePath(route.polyline.encodedPolyline);
                            combinedPath = combinedPath.concat(path);
                        }
                        if (route.legs) {
                            for (let i = 0; i < seg.segmentGroups.length; i++) {
                                let leg = route.legs[i];
                                if (leg && leg.endLocation) {
                                    // We'll use this to place markers (no ETA needed)
                                    let group = seg.segmentGroups[i];
                                    let loc = leg.endLocation.latLng;
                                    if (loc) {
                                        group.jobs.forEach(job => {
                                            db.ref(`developer/route_planner/jobs/${job.id}`).update({ lat: loc.latitude, lng: loc.longitude });
                                        });
                                    }
                                }
                            }
                        }
                    } else {
                        console.warn("Segment route failed:", result);
                    }
                }

                // Draw polyline
                if (map && combinedPath.length > 0) {
                    if (activePolyline) activePolyline.setMap(null);
                    activePolyline = new google.maps.Polyline({
                        path: combinedPath,
                        geodesic: true,
                        strokeColor: "#00d4ff",
                        strokeOpacity: 0.8,
                        strokeWeight: 6,
                        map: map
                    });
                }

                // Create markers from grouped jobs (using lat/lng saved above)
                if (map) {
                    Object.values(mapMarkers).forEach(m => m.setMap(null));
                    mapMarkers = {};
                    // We need to iterate over finalGroups in order and get the first job's lat/lng
                    let counter = 0;
                    for (let group of finalGroups) {
                        let firstJob = group.jobs[0];
                        let lat = firstJob.lat;
                        let lng = firstJob.lng;
                        if (lat && lng) {
                            const labelText = `${counter+1}. ${firstJob.name || ''}`;
                            const marker = new google.maps.Marker({
                                position: { lat: lat, lng: lng },
                                map: map,
                                label: {
                                    text: labelText,
                                    color: '#00b32d',
                                    fontWeight: 'bold',
                                    fontSize: '12px',
                                    className: 'driver-map-label'
                                },
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 14,
                                    fillColor: '#ff9800',
                                    fillOpacity: 1,
                                    strokeColor: 'white',
                                    strokeWeight: 2
                                }
                            });
                            // Removed click listener for Done? overlay; now does nothing
                            mapMarkers[firstJob.id] = marker;
                            counter++;
                        }
                    }
                }

            } catch (e) {
                console.error("Route fetch error", e);
                // Fallback: just use the finalGroups order without polyline
                optimizedOrder = [];
                finalGroups.forEach(group => group.jobs.forEach(job => optimizedOrder.push(job.id)));
            }

            renderList();

            // Add glow to map button if there are jobs
            const mapBtn = document.getElementById('map-btn');
            if (mapBtn) {
                if (optimizedOrder.length > 0) {
                    mapBtn.classList.add('map-btn-glow');
                } else {
                    mapBtn.classList.remove('map-btn-glow');
                }
            }

            // Update ETA display only if we have previously computed ETA (etaTotalMinutes != 0)
            if (etaTotalMinutes > 0) {
                updateETADisplay();
            } else {
                document.getElementById('eta-display').style.display = 'none';
                document.getElementById('eta-display').classList.remove('eta-glow');
            }
            // Update stop counter
            const counter = document.getElementById('stop-counter');
            if (optimizedOrder.length > 0) {
                counter.textContent = optimizedOrder.length;
                counter.style.display = 'inline-block';
            } else {
                counter.style.display = 'none';
            }
        }

        function updateQuantity(category, delta) {

            val = Math.max(0, val + delta);

            detailsData[key] = val;
        }

                    const category = this.dataset.category;

                });
            });

                }
            };

            // Scroll when the viewport resizes (keyboard appears/disappears)

            const handleResize = function() {

                resizeTimer = setTimeout(scrollActionsIntoView, 300);
            };
            window.addEventListener('resize', handleResize);

            // Also scroll on focus with a longer delay to ensure keyboard is up
            const scrollOnFocus = function() {

        // ---- Location Tracking ----
        function startTracking() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported by your browser.");
                return;
            }
            const btn = document.getElementById('bullseye-btn');
            if (btn) btn.classList.add('active');
            isTracking = true;

            // Watch position
            locationWatchId = navigator.geolocation.watchPosition(
                function(pos) {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const loc = new google.maps.LatLng(lat, lng);

                    // Remove old marker/circle if any
                    if (userMarker) userMarker.setMap(null);
                    if (userCircle) userCircle.setMap(null);

                    // Create pulsing circle
                    userCircle = new google.maps.Circle({
                        map: map,
                        center: loc,
                        radius: 20,
                        fillColor: '#ff6600',
                        fillOpacity: 0.5,
                        strokeColor: '#ff6600',
                        strokeWeight: 2,
                        strokeOpacity: 0.8
                    });
                    // Animate circle (pulse)
                    let pulseInterval = setInterval(function() {
                        if (!userCircle) { clearInterval(pulseInterval); return; }
                        let rad = userCircle.getRadius();
                        let newRad = rad + 5;
                        if (newRad > 40) newRad = 20;
                        userCircle.setRadius(newRad);
                        // Also toggle opacity slightly
                        let op = userCircle.getFillOpacity();
                        let newOp = (op === 0.5) ? 0.8 : 0.5;
                        userCircle.setFillOpacity(newOp);
                    }, 500);

                    // Store interval to clear later
                    userCircle._pulseInterval = pulseInterval;

                    // Create marker at user location (small dot)
                    userMarker = new google.maps.Marker({
                        position: loc,
                        map: map,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 8,
                            fillColor: '#ff6600',
                            fillOpacity: 1,
                            strokeColor: '#fff',
                            strokeWeight: 2
                        }
                    });

                    // Center map on user
                    map.panTo(loc);
                    map.setZoom(15);
                },
                function(err) {
                    console.error("Geolocation error:", err);
                    alert("Unable to get your location: " + err.message);
                    stopTracking();
                },
                { enableHighAccuracy: true, maximumAge: 10000 }
            );
        }

        function stopTracking() {
            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
                locationWatchId = null;
            }
            if (userMarker) {
                userMarker.setMap(null);
                userMarker = null;
            }
            if (userCircle) {
                if (userCircle._pulseInterval) {
                    clearInterval(userCircle._pulseInterval);
                }
                userCircle.setMap(null);
                userCircle = null;
            }
            isTracking = false;
            const btn = document.getElementById('bullseye-btn');
            if (btn) btn.classList.remove('active');
            // Zoom back to route bounds if any
            if (optimizedOrder.length > 0 && activePolyline) {
                const bounds = new google.maps.LatLngBounds();
                activePolyline.getPath().forEach(p => bounds.extend(p));
                map.fitBounds(bounds);
            } else {
                map.setCenter({ lat: 49.8425, lng: -99.9497 });
                map.setZoom(12);
            }
        }

        // ---------- ETA ON-DEMAND CALCULATION ----------
        async function calculateETAOnDemand() {
            if (etaCalculating) return;
            if (!optimizedOrder || optimizedOrder.length === 0) {
                alert("No stops to calculate ETA.");
                return;
            }
            const etaBtn = document.getElementById('eta-btn');
            etaBtn.disabled = true;
            etaBtn.classList.add('eta-spin');
            etaCalculating = true;

            try {
                // Group jobs by address (same as in updateRoute)
                const pendingJobs = Object.entries(jobs)
                    .filter(([id, job]) => job.status === 'pending_pickup')
                    .map(([id, job]) => ({ id, ...job }));
                const groupMap = new Map();
                pendingJobs.forEach(job => {
                    const key = `${job.pickup_location}, ${job.city}`.toLowerCase();
                    if (!groupMap.has(key)) {
                        groupMap.set(key, { key, jobs: [], addrString: `${job.pickup_location}, ${job.city}` });
                    }
                    groupMap.get(key).jobs.push(job);
                });
                const groups = Array.from(groupMap.values());
                // Order groups based on optimizedOrder
                const jobIdToGroup = {};
                groups.forEach(group => {
                    group.jobs.forEach(job => jobIdToGroup[job.id] = group);
                });
                const orderedGroups = [];
                const seenGroups = new Set();
                optimizedOrder.forEach(id => {
                    const group = jobIdToGroup[id];
                    if (group && !seenGroups.has(group.key)) {
                        seenGroups.add(group.key);
                        orderedGroups.push(group);
                    }
                });

                const origin = "1604 Moreland Ave, Brandon MB";
                const destination = "1604 Moreland Ave, Brandon MB";
                const waypoints = orderedGroups.map(g => ({ address: g.addrString }));

                const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI",
                        "X-Goog-FieldMask": "routes.duration,routes.distanceMeters,routes.legs.duration,routes.legs.distanceMeters"
                    },
                    body: JSON.stringify({
                        origin: { address: origin },
                        destination: { address: destination },
                        intermediates: waypoints,
                        travelMode: "DRIVE",
                        optimizeWaypointOrder: false
                    })
                });
                const data = await response.json();
                if (data.routes && data.routes[0]) {
                    const route = data.routes[0];
                    let totalDurationSeconds = 0;
                    let totalDistanceMeters = 0;
                    if (route.legs) {
                        route.legs.forEach(leg => {
                            totalDurationSeconds += parseFloat(leg.duration.replace('s', ''));
                            totalDistanceMeters += parseFloat(leg.distanceMeters);
                        });
                    } else {
                        totalDurationSeconds = parseFloat(route.duration.replace('s', ''));
                        totalDistanceMeters = parseFloat(route.distanceMeters);
                    }
                    etaTotalMinutes = totalDurationSeconds / 60;
                    etaTotalKm = totalDistanceMeters / 1000;
                    updateETADisplay();
                } else {
                    alert("Could not calculate ETA.");
                }
            } catch (e) {
                console.error(e);
                alert("Error calculating ETA.");
            } finally {
                etaCalculating = false;
                etaBtn.disabled = false;
                etaBtn.classList.remove('eta-spin');
            }
        }

        // ---------- UPDATE ETA DISPLAY ----------
        function updateETADisplay() {
            const display = document.getElementById('eta-display');
            const etaTime = document.getElementById('eta-time');
            const etaAdjusted = document.getElementById('eta-adjusted');
            const etaAdjustedTime = document.getElementById('eta-adjusted-time');
            const etaDistance = document.getElementById('eta-distance');
            if (!optimizedOrder || optimizedOrder.length === 0 || etaTotalMinutes === 0) {
                display.style.display = 'none';
                display.classList.remove('eta-glow');
                return;
            }
            // Format time
            const totalMinutes = etaTotalMinutes;
            const hours = Math.floor(totalMinutes / 60);
            const mins = Math.round(totalMinutes % 60);
            let timeStr = '';
            if (hours > 0) timeStr += hours + 'h ';
            timeStr += mins + 'm';
            etaTime.textContent = timeStr;
            // Adjusted time
            const stops = optimizedOrder.length;
            const adjustedMinutes = totalMinutes + 3 * stops;
            const adjHours = Math.floor(adjustedMinutes / 60);
            const adjMins = Math.round(adjustedMinutes % 60);
            let adjStr = '';
            if (adjHours > 0) adjStr += adjHours + 'h ';
            adjStr += adjMins + 'm';
            etaAdjustedTime.textContent = adjStr;
            etaAdjusted.style.display = 'inline';
            // Distance
            etaDistance.textContent = etaTotalKm.toFixed(1);
            display.style.display = 'block';
            display.classList.add('eta-glow');
        }

        // ---------- SAVE ROUTE ----------
        async function saveCurrentRoute() {
            if (!optimizedOrder || optimizedOrder.length === 0) {
                alert("No stops to save.");
                return;
            }
            // Check if ETA is calculated; if not, ask user
            if (etaTotalMinutes === 0) {
                const calculate = confirm("Calculate ETA for this route?");
                if (calculate) {
                    await calculateETAOnDemand();
                    // If still zero (maybe error), continue? We'll allow save anyway.
                }
            }
            const labelInput = prompt("Enter a label for this saved route:", "");
            if (labelInput === null || labelInput.trim() === "") return;
            // Capitalize first letter
            let label = labelInput.trim();
            if (label.length > 0) {
                label = label.charAt(0).toUpperCase() + label.slice(1);
            }
            // Build array of job objects in order
            const stops = [];
            optimizedOrder.forEach(id => {
                const job = jobs[id];
                if (job) {
                    stops.push({
                        name: job.name,
                        pickup_location: job.pickup_location,
                        city: job.city,
                        manual_priority: job.manual_priority || false,
                        box_qty: job.box_qty || 0,
                        piece_qty: job.piece_qty || 0,
                        envelope_qty: job.envelope_qty || 0,
                        skid_qty: job.skid_qty || 0,
                        weight_lbs: job.weight_lbs || 0,
                        other_details: job.other_details || '',
                        timestamp: job.timestamp,
                        created_by: job.created_by
                    });
                }
            });
            if (stops.length === 0) return;
            const routeData = {
                label: label,
                timestamp: Date.now(),
                stops: stops,
                etaTotalMinutes: etaTotalMinutes,
                etaTotalKm: etaTotalKm
            };
            db.ref('developer/route_planner/saved_routes').push(routeData)
                .then(() => {
                    // After saving, clear all jobs from the route stops
                    db.ref('developer/route_planner/jobs').remove();
                    etaTotalMinutes = 0;
                    etaTotalKm = 0;
                    document.getElementById('eta-display').style.display = 'none';
                    document.getElementById('eta-display').classList.remove('eta-glow');
                })
                .catch(err => alert("Error saving route: " + err.message));
        }

                const pill = document.createElement('div');
                pill.className = 'saved-route-pill';

                // Click to load

                    if (confirm(`Load route "${label}"? This will replace your current stops.`)) {
                        loadSavedRoute(key);
                    }
                });
                // Long press to delete (mousedown + mouseup timer)
                let timer = null;
                pill.addEventListener('mousedown', function(e) {
                    timer = setTimeout(() => {

                            db.ref(`developer/route_planner/saved_routes/${key}`).remove()
                                .catch(err => alert("Error deleting route: " + err.message));
                        }
                    }, 2000);
                });
                pill.addEventListener('mouseup', function(e) {
                    if (timer) { clearTimeout(timer); timer = null; }
                });
                pill.addEventListener('mouseleave', function(e) {
                    if (timer) { clearTimeout(timer); timer = null; }
                });
                // Touch events for mobile
                pill.addEventListener('touchstart', function(e) {
                    timer = setTimeout(() => {
                        if (confirm(`Delete saved route "${label}"?`)) {
                            db.ref(`developer/route_planner/saved_routes/${key}`).remove()
                                .catch(err => alert("Error deleting route: " + err.message));
                        }
                    }, 2000);
                });
                pill.addEventListener('touchend', function(e) {
                    if (timer) { clearTimeout(timer); timer = null; }
                });
                pill.addEventListener('touchmove', function(e) {
                    if (timer) { clearTimeout(timer); timer = null; }
                });
                container.appendChild(pill);
            });
        }

        // ---------- LOAD SAVED ROUTE ----------
        function loadSavedRoute(key) {
            const ref = db.ref(`developer/route_planner/saved_routes/${key}`);
            ref.once('value').then(snap => {
                const data = snap.val();
                if (!data || !data.stops || data.stops.length === 0) {
                    alert("Route is empty.");
                    return;
                }
                // Set ETA from saved data
                etaTotalMinutes = data.etaTotalMinutes || 0;
                etaTotalKm = data.etaTotalKm || 0;
                // Clear current jobs
                db.ref('developer/route_planner/jobs').remove();
                // Add each stop as a new job, preserving details
                const newJobs = {};
                const promises = [];
                data.stops.forEach((stop, index) => {
                    const newJob = {
                        name: stop.name || '',
                        pickup_location: stop.pickup_location || '',
                        city: stop.city || '',
                        status: 'pending_pickup',
                        timestamp: stop.timestamp || Date.now(),
                        created_by: stop.created_by || currentUser,
                        manual_priority: stop.manual_priority || false,
                        box_qty: stop.box_qty || 0,
                        piece_qty: stop.piece_qty || 0,
                        envelope_qty: stop.envelope_qty || 0,
                        skid_qty: stop.skid_qty || 0,
                        weight_lbs: stop.weight_lbs || 0,
                        other_details: stop.other_details || ''
                    };
                    const newRef = db.ref('developer/route_planner/jobs').push();
                    promises.push(newRef.set(newJob));
                    // Store the new ID to set manual_order later
                    newJobs[index] = newRef.key;
                });
                Promise.all(promises).then(() => {
                    // After all jobs are added, set manual_order in the saved order
                    const orderArray = Object.values(newJobs);
                    db.ref('developer/route_planner/manual_order').set(orderArray);
                    // updateRoute will be triggered automatically
                    // Also update ETA display with loaded ETA
                    if (etaTotalMinutes > 0) {
                        updateETADisplay();
                    }
                }).catch(err => alert("Error loading route: " + err.message));
            }).catch(err => alert("Error loading saved route: " + err.message));
        }

               // ---------- SHARE ROUTE (composes email with route info) ----------
        function buildRouteBody(routeLabel, stops, etaMinutes, etaKm, dateStr) {
            let lines = [];
            // Simple header with spaces
            lines.push('E&C ROUTE PLANNER');
            lines.push('Manifest');
            lines.push('');
            lines.push(`Route: ${routeLabel}`);
            lines.push(`Date:  ${dateStr}`);
            if (etaMinutes > 0) {
                const hours = Math.floor(etaMinutes / 60);
                const mins = Math.round(etaMinutes % 60);
                let timeStr = '';
                if (hours > 0) timeStr += hours + 'h ';
                timeStr += mins + 'm';
                lines.push(`ETA:   ${timeStr}  (${etaKm.toFixed(1)} km)`);
            } else {
                lines.push('ETA:   Not calculated');
            }
            lines.push(`Stops: ${stops.length}`);
            lines.push('');
            // List stops with details
            stops.forEach((stop, idx) => {
                const name = stop.name || 'No name';
                const city = stop.city || '';
                let details = [];
                if (stop.box_qty) details.push(`Box: ${stop.box_qty}`);
                if (stop.piece_qty) details.push(`Piece: ${stop.piece_qty}`);
                if (stop.envelope_qty) details.push(`Envelope: ${stop.envelope_qty}`);
                if (stop.skid_qty) details.push(`Skid: ${stop.skid_qty}`);
                if (stop.weight_lbs) details.push(`Weight: ${stop.weight_lbs} LBS`);
                if (stop.other_details) details.push(`Other: ${stop.other_details}`);
                const detailsStr = details.length ? details.join(' | ') : 'No details';
                lines.push(`${idx+1}. ${name}`);
                lines.push(`   Location: ${city}`);
                lines.push(`   Details: ${detailsStr}`);
                lines.push('');
            });
            // No decorative lines or "End of Manifest"
            return lines.join('\n');
        }
        function shareRoute() {
            // Show date modal
            document.getElementById('date-modal').style.display = 'flex';
            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('route-date-input').value = today;
            pendingShareDate = null;
        }

        function confirmDate() {
            const dateInput = document.getElementById('route-date-input');
            const selectedDate = dateInput.value;
            if (!selectedDate) {
                alert("Please select a date.");
                return;
            }
            document.getElementById('date-modal').style.display = 'none';
            // Format date for display
            const dateObj = new Date(selectedDate + 'T00:00:00');
            const dateStr = dateObj.toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
            // Now build email
            buildAndSendEmail(dateStr);
        }

        function cancelDate() {
            document.getElementById('date-modal').style.display = 'none';
        }

        function buildAndSendEmail(dateStr) {
            const savedRoutesRef = db.ref('developer/route_planner/saved_routes');
            savedRoutesRef.once('value').then(snap => {
                const savedData = snap.val() || {};
                let bodyParts = [];

                // Process saved routes
                const keys = Object.keys(savedData);
                keys.forEach(key => {
                    const route = savedData[key];
                    const label = route.label || 'Unnamed';
                    const stops = route.stops || [];
                    if (stops.length === 0) return;
                    const etaMinutes = route.etaTotalMinutes || 0;
                    const etaKm = route.etaTotalKm || 0;
                    const content = buildRouteBody(label, stops, etaMinutes, etaKm, dateStr);
                    bodyParts.push(content);
                });

                // Process current route
                if (optimizedOrder && optimizedOrder.length > 0) {
                    const currentStops = [];
                    optimizedOrder.forEach(id => {
                        const job = jobs[id];
                        if (job) {
                            currentStops.push({
                                name: job.name,
                                city: job.city,
                                box_qty: job.box_qty || 0,
                                piece_qty: job.piece_qty || 0,
                                envelope_qty: job.envelope_qty || 0,
                                skid_qty: job.skid_qty || 0,
                                weight_lbs: job.weight_lbs || 0,
                                other_details: job.other_details || ''
                            });
                        }
                    });
                    if (currentStops.length > 0) {
                        const content = buildRouteBody('Current Route', currentStops, etaTotalMinutes, etaTotalKm, dateStr);
                        bodyParts.push(content);
                    }
                }

                if (bodyParts.length === 0) {
                    alert("No routes to share.");
                    return;
                }

                const emailBody = bodyParts.join('\n\n');
                const subject = `Route Manifest for ${dateStr}`;
                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
                window.location.href = mailtoLink;

            }).catch(err => alert("Error loading saved routes: " + err.message));
        }

        // ---------- EXTERNAL ROUTE NAVIGATION (similar to driver.html) ----------
        function openExternalRoute() {
            if (optimizedOrder.length === 0) {
                alert("No stops to route.");
                return;
            }
            const origin = "1604 Moreland Ave, Brandon MB";
            const destination = "1604 Moreland Ave, Brandon MB";
            const seenLocs = new Set();
            // Limit to first 25 stops for the external maps link (Google Maps URL limit)
            const maxStopsForExternal = 25;
            let stopsAdded = 0;
            const waypoints = optimizedOrder.map(id => {
                if (stopsAdded >= maxStopsForExternal) return "";
                const job = jobs[id];
                if (!job) return "";
                // Use pickup_location and city (no business name) for accuracy
                const addr = job.pickup_location;
                const city = job.city || "Brandon";
                const key = `${addr}, ${city}`;
                if (seenLocs.has(key)) return "";
                seenLocs.add(key);
                stopsAdded++;
                return encodeURIComponent(key);
            }).filter(w => w !== "").join("|");

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = `intent://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
            } else {
                window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
            }
        }
