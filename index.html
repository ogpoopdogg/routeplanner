<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E&C ROUTE PLANNER</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="gold">
    <link href="//fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Combined and simplified CSS from both files */
        :root {
            --accent: #facc15; --bg: #111827; --card: #1f2937; --text: #f9fafb; --card-text: #e5e7eb;
            --active-green: #22c55e; --archive-orange: #f97316; --note-blue: #3b82f6; --pro-blue: #2563eb;
            --header-bg: #030712; --input-bg: #374151; --border: #4b5563; --modal-bg: #111827;
            --shadow-soft: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -4px rgba(0,0,0,0.3);
        }
        body.light-mode {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --card-text: #374151; --header-bg: #ffffff;
            --input-bg: #f9fafb; --border: #e5e7eb; --modal-bg: #ffffff; --accent: #2563eb; --active-green: #16a34a;
        }
        body.light-mode * { color: #000 !important; }
        body.light-mode button { background: #fff !important; color: #000 !important; border: 1px solid #ccc !important; }
        body.light-mode .primary { background: #fff !important; border: 2px solid #00b32d !important; }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { padding: 16px 24px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); }
        .header-logo { height: 24px; width: auto; margin-right: 12px; vertical-align: middle; filter: drop-shadow(0 0 3px var(--accent)); cursor: pointer; }
        .shiny-text { background: linear-gradient(to right, var(--accent) 20%, #ccc 50%, var(--accent) 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: text-shine 3s linear infinite; }
        @keyframes text-shine { to { background-position: 200% center; } }

        #login-overlay { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 100%; max-width: 350px; background: #111; padding: 40px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .login-input { width: 100%; padding: 14px; margin: 12px 0; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 16px; outline: none; }
        .login-submit { width: 100%; padding: 14px; margin-top: 20px; background: var(--accent); border: none; color: #000; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        .flex-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .input-wrap { position: relative; flex: 1; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(250,204,21,0.2); }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); z-index: 5000; max-height: 200px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--text); }
        .suggestion-item:hover { background: var(--accent); color: #000; }
        .suggestion-reset { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 9px; font-weight: 700; cursor: pointer; color: #666; text-transform: uppercase; z-index: 10; }

        #map-modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: #000; }
        #map { width: 100%; height: 100%; }
        .close-map { position: fixed; top: 20px; right: 20px; z-index: 3005; background: #b71c1c; color: #fff; border: none; width: 140px; height: 40px; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #zoom-out-btn { top: 70px; background: #448800; }
        #reset-driver-view-btn { position: absolute; bottom: 20px; left: 20px; z-index: 3005; background: #222; color: #fff; border: 1px solid #fff; border-radius: 6px; padding: 8px 12px; font-weight: 700; cursor: pointer; display: none; }

        /* Directions panel styles */
        #directions-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            color: var(--text);
            max-height: 45vh;
            overflow-y: auto;
            padding: 10px 16px;
            border-top: 2px solid var(--accent);
            z-index: 3010;
            transition: max-height 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        #directions-panel.collapsed {
            max-height: 40px;
            overflow: hidden;
            cursor: pointer;
        }
        #directions-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        #directions-panel .panel-header h4 {
            margin: 0;
            color: var(--accent);
        }
        #directions-panel .panel-header button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .step-item .step-number {
            font-weight: 700;
            color: var(--accent);
            min-width: 28px;
        }
        .step-item .step-instruction {
            flex: 1;
        }
        .step-item .step-detail {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .step-item.active-step {
            background: var(--accent);
            color: #000;
            border-radius: 6px;
            padding: 8px 12px;
        }
        .step-item.active-step .step-detail {
            color: #333;
        }
        .nav-controls {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            justify-content: center;
        }
        .nav-controls button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }
        .nav-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .primary { padding: 14px 16px; background: var(--btn-bg, #374151); color: var(--text); font-weight: 700; border: 1px solid var(--border); border-bottom: 3px solid var(--accent); cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .btn-add { background: var(--active-green); color: #000; border: none; padding: 14px 24px; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-clear { background: #b71c1c; color: #fff; border: none; padding: 8px 16px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        #job-list-container { background: var(--card); border-radius: 12px; padding: 15px; margin: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
        #job-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .job-item { display: flex; align-items: center; gap: 12px; background: var(--input-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: grab; user-select: none; -webkit-user-select: none; }
        .job-item.sortable-ghost { opacity: 0.4; background: var(--accent); }
        .job-number { background: #fff; color: #000; font-weight: 900; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .job-info { flex: 1; overflow: hidden; }
        .job-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .job-address { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star-icon { width: 24px; height: 24px; cursor: pointer; fill: none; stroke: var(--accent); stroke-width: 2; }
        .star-icon.active { fill: var(--accent); }
        .delete-icon { width: 20px; height: 20px; cursor: pointer; fill: #b71c1c; }

        #install-btn { display: none; background: var(--pro-blue); color: #fff; border: none; padding: 14px 16px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; position: fixed; right: 15px; bottom: 15px; z-index: 1002; }

        /* Map button styles */
        .map-btn {
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 4px, transparent 4px, transparent 8px), #2c3e50;
            color: white;
            border: 1px solid #fff;
            padding: 6px 8px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            line-height: 1;
            min-width: 36px;
            min-height: 36px;
        }
        .map-btn-glow {
            box-shadow: 0 0 15px var(--accent);
        }

        /* Driver map label style (from command.html) */
        .driver-map-label { color: #00ff00 !important; font-weight: 700; text-shadow: 0 0 2px #000; }

        /* ETA glow */
        .eta-glow {
            border-color: #00bfff !important;
            box-shadow: 0 0 15px #00bfff;
        }

        @media (max-width: 768px) {
            header { padding: 8px 12px; }
            .header-logo { height: 20px; }
            #directions-panel { max-height: 50vh; }
        }
    </style>
</head>
<body>
    <!-- Login Overlay (exact copy from command.html) -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--accent);">ROUTE PLANNER LOGIN</h2>
            <input type="email" id="login-user" class="login-input" placeholder="Email" autofocus>
            <input type="password" id="login-pin" class="login-input" placeholder="Password">
            <button class="login-submit" onclick="attemptLogin()">Authorize</button>
        </div>
    </div>

    <!-- Header (similar to command.html) -->
    <header>
    <div style="display: flex; align-items: center; gap: 10px; flex-shrink:0;">
        <img src="icon2.png" class="header-logo" alt="Logo" onclick="toggleTheme()">
        <span class="shiny-text" style="font-size:16px; font-weight:700;">E&C ROUTE PLANNER</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px; margin-left: auto;">
        <button id="route-btn" class="map-btn" onclick="openExternalRoute()" aria-label="Route"><svg viewBox="0 0 24 24" width="20" height="20" stroke="white" fill="none" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button>
        <button id="map-btn" class="map-btn" onclick="openMap()" aria-label="Map" style="background: url('//mt.google.com/vt/lyrs=m&x=235&y=348&z=10') center/cover; border: 1px solid #fff;"></button>
    </div>
</header>

    <!-- Input fields with autocomplete -->
    <div style="padding: 20px;">
        <div style="background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-soft);">
            <div class="flex-row">
                <div class="rel" style="position: relative; width: 100%;">
                    <input type="text" id="f-name" class="glow-field" placeholder="Contact/Business Name" autocomplete="off" oninput="handleNameInput(this.value)" onblur="setTimeout(()=>document.getElementById('suggestions').style.display='none', 200)" style="padding-right:50px;">
                    <div id="suggestions" class="suggestions-box"></div>
                    <div onclick="resetFormFields()" class="suggestion-reset" style="right:36px;">RESET</div>
                </div>
            </div>
            <div class="flex-row">
                <div class="input-wrap" style="flex: 0.7;">
                    <input type="text" id="f-address" placeholder="Address">
                </div>
                <div class="input-wrap" style="flex: 0.3;">
                    <input type="text" id="f-city" placeholder="City" oninput="handleCityInput(this.value)">
                    <div id="city-suggestions" class="suggestions-box"></div>
                </div>
            </div>
            <button class="btn-add" onclick="addJob()" style="width:100%; margin-top:10px;">ADD TO ROUTE</button>
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button class="btn-clear" onclick="clearAllJobs()">CLEAR ALL</button>
            </div>
        </div>

        <!-- ETA Display -->
        <div id="eta-display" style="margin-top:15px; background:var(--card); border-radius:12px; padding:12px; border:1px solid var(--border); display:none; color:var(--text);">
            <span>Total ETA: <span id="eta-time">0</span> <span id="eta-adjusted" style="color:#ff8c00; display:none;">(<span id="eta-adjusted-time">0</span>)</span> <span id="eta-distance-display" style="display:inline;">| <span id="eta-distance">0</span> km</span></span>
        </div>

        <!-- Job List Container (like mini-map-list from driver.html) -->
        <div id="job-list-container">
            <h3 style="margin-top:0; color:var(--accent); display: flex; align-items: center; gap: 8px;">
                ROUTE STOPS
                <span id="stop-counter" style="display:none; border:2px solid white; color:#ff8c00; font-weight:bold; padding:0 8px; border-radius:12px; font-size:14px;"></span>
            </h3>
            <div id="job-list"></div>
            <div id="empty-state" style="text-align:center; color:#666; padding:20px;">No jobs added. Use the form above to add stops.</div>
        </div>
    </div>

    <!-- Map Modal -->
    <div id="map-modal">
        <button id="close-map-btn" class="close-map" onclick="closeMap()">CLOSE MAP</button>
        <button id="zoom-out-btn" class="close-map" onclick="zoomToAll()" style="top:70px; background:#448800;">ZOOM OUT</button>
        <button id="reset-driver-view-btn" onclick="resetMapView()" style="display:none;">← BACK</button>
        <div id="map"></div>
        <!-- Directions Panel -->
        <div id="directions-panel" class="collapsed">
            <div class="panel-header" onclick="toggleDirectionsPanel()">
                <h4>📍 Turn-by-Turn</h4>
                <button id="toggle-directions-btn">▲</button>
            </div>
            <div id="directions-content">
                <div id="steps-list"></div>
                <div class="nav-controls">
                    <button id="prev-step-btn" onclick="prevStep()" disabled>◀ Previous</button>
                    <button id="next-step-btn" onclick="nextStep()">Next ▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Install App Button -->
    <button id="install-btn">Install App</button>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI&libraries=geometry,drawing,places&callback=initMap" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        // Firebase config (same as original)
        firebase.initializeApp({
            apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
            authDomain: "eandccourier-36fcc.firebaseapp.com",
            databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
            projectId: "eandccourier-36fcc",
            messagingSenderId: "1067680083511",
            appId: "1:1067680083511:android:22d1eb3757302492bd19b2"
        });
        const auth = firebase.auth();
        const db = firebase.database();

        // Global variables
        let currentUser = null;
        let jobs = {};              // All jobs under developer/route_planner/jobs
        let manualOrder = [];        // Array of job IDs in current order (from Firebase)
        let optimizedOrder = [];     // Array of job IDs after route optimization
        let addressData = {};        // From address_lookup
        let map, mainMap, mapMarkers = {}, activePolyline = null, mapBoundsInitialized = false;
        let autocompleteAddress;     // Google Places Autocomplete for address field
        let etaTotalMinutes = 0;
        let etaTotalKm = 0;

        // Directions related globals
        let allSteps = [];
        let currentStepIndex = 0;
        let stepMarkers = [];

        // Theme handling (copied from command.html)
        if (localStorage.getItem('ec_theme') === 'light') document.body.classList.add('light-mode');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('ec_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            if (map) map.setOptions({ styles: document.body.classList.contains('light-mode') ? [] : mapStyles });
        }

        // Map styles (from command.html)
        const mapStyles = [{"featureType":"all","elementType":"all","stylers":[{"invert_lightness":!0},{"saturation":10},{"lightness":30},{"gamma":0.5},{"hue":"#435158"}]}];

        // ---------- LOGIN (copied from command.html) ----------
        function attemptLogin() {
            const email = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pin').value.trim();
            if (!email || !pass) return;
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => auth.signInWithEmailAndPassword(email, pass))
                .catch(err => alert("Login Failed: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email;
                const username = email.split('@')[0].toLowerCase();
                db.ref(`roles/${username}/command`).once('value').then(snap => {
                    if (snap.val() === true) {
                        currentUser = username;
                        document.getElementById('login-overlay').style.display = 'none';
                        initApp();
                    } else {
                        alert("ACCESS DENIED");
                        auth.signOut();
                        document.getElementById('login-overlay').style.display = 'flex';
                    }
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        // ---------- DATA LISTENERS (under /developer/route_planner) ----------
        function initApp() {
            db.ref('address_lookup').on('value', snap => { addressData = snap.val() || {}; });
            db.ref('developer/route_planner/jobs').on('value', snap => {
                jobs = snap.val() || {};
                updateRoute();
            });
            db.ref('developer/route_planner/manual_order').on('value', snap => {
                manualOrder = snap.val() || [];
                updateRoute();
            });
            initPlaces();
        }

        // ---------- ADDRESS AUTOCOMPLETE (from command.html) ----------
        function handleNameInput(val) {
            showSuggestions(val, 'suggestions', name => `<div class="suggestion-item" onclick="selectClient('${name.replace(/'/g, "\\'")}')">${name}</div>`);
        }
        function handleCityInput(val) {
            showSuggestions(val, 'city-suggestions', city => `<div class="suggestion-item" onclick="selectCity('${city.replace(/'/g, "\\'")}')">${city} (${addressData[city]?.city})</div>`);
        }
        function showSuggestions(val, elementId, htmlCallback) {
            const box = document.getElementById(elementId);
            if (val.length < 1) { box.style.display = 'none'; return; }
            const matches = Object.keys(addressData).filter(key => key.toLowerCase().startsWith(val.toLowerCase().trim()));
            if (matches.length === 0) { box.style.display = 'none'; return; }
            box.innerHTML = matches.map(htmlCallback).join('');
            box.style.display = 'block';
        }
        function selectClient(name) {
            const data = addressData[name];
            if (!data) return;
            document.getElementById('f-name').value = name;
            document.getElementById('f-address').value = data.address || '';
            document.getElementById('f-city').value = data.city || '';
            document.getElementById('suggestions').style.display = 'none';
        }
        function selectCity(city) {
            document.getElementById('f-city').value = city;
            document.getElementById('city-suggestions').style.display = 'none';
        }
        function resetFormFields() {
            document.getElementById('f-name').value = '';
            document.getElementById('f-address').value = '';
            document.getElementById('f-city').value = '';
        }

        function initPlaces() {
            const addressInput = document.getElementById('f-address');
            if (!addressInput) return;
            const options = {
                componentRestrictions: { country: 'ca' },
                bounds: new google.maps.Circle({ center: new google.maps.LatLng(49.848, -99.950), radius: 50000 }).getBounds(),
                strictBounds: false
            };
            autocompleteAddress = new google.maps.places.Autocomplete(addressInput, options);
            autocompleteAddress.addListener('place_changed', () => {
                const place = autocompleteAddress.getPlace();
                if (!place.address_components) return;
                for (let comp of place.address_components) {
                    if (comp.types.includes('locality')) {
                        document.getElementById('f-city').value = comp.long_name;
                        break;
                    }
                }
            });
        }

        // ---------- JOB MANAGEMENT ----------
        function addJob() {
            const name = document.getElementById('f-name').value.trim();
            const address = document.getElementById('f-address').value.trim();
            const city = document.getElementById('f-city').value.trim();
            if (!name || !address || !city) {
                alert("Please fill in all fields.");
                return;
            }
            const newJob = {
                name: name,
                pickup_location: address,
                city: city,
                status: 'pending_pickup',
                timestamp: Date.now(),
                created_by: currentUser,
                manual_priority: false
            };
            const newJobRef = db.ref('developer/route_planner/jobs').push();
            newJobRef.set(newJob).then(() => {
                const sanitizedKey = name.replace(/[.#$\[\]\/]/g, "").trim();
                const updateObj = {
                    address: address,
                    city: city,
                    last_edit_by: currentUser
                };
                db.ref("address_lookup").child(sanitizedKey).update(updateObj);
                resetFormFields();
            }).catch(err => alert("Error adding job: " + err.message));
        }

        function deleteJob(id) {
            if (confirm("Remove this job from route?")) {
                db.ref(`developer/route_planner/jobs/${id}`).remove();
            }
        }

        function clearAllJobs() {
            if (confirm("Clear all jobs?")) {
                db.ref('developer/route_planner/jobs').remove();
                document.getElementById('eta-display').style.display = 'none';
                document.getElementById('eta-display').classList.remove('eta-glow');
                document.getElementById('stop-counter').style.display = 'none';
                etaTotalMinutes = 0;
                etaTotalKm = 0;
                allSteps = [];
                document.getElementById('steps-list').innerHTML = '';
            }
        }

        function togglePriority(id, current) {
            const newVal = !current;
            db.ref(`developer/route_planner/jobs/${id}/manual_priority`).set(newVal);
        }

        // ---------- ROUTE OPTIMIZATION (adapted from driver.html's updateRoute) ----------
        async function updateRoute() {
            if (!jobs) return;

            const pendingJobs = Object.entries(jobs)
                .filter(([id, job]) => job.status === 'pending_pickup')
                .map(([id, job]) => ({ id, ...job }));

            if (pendingJobs.length === 0) {
                optimizedOrder = [];
                renderList();
                if (activePolyline) activePolyline.setMap(null);
                if (mapMarkers) Object.values(mapMarkers).forEach(m => m.setMap(null));
                mapMarkers = {};
                const mapBtn = document.getElementById('map-btn');
                if (mapBtn) mapBtn.classList.remove('map-btn-glow');
                document.getElementById('eta-display').style.display = 'none';
                document.getElementById('eta-display').classList.remove('eta-glow');
                document.getElementById('stop-counter').style.display = 'none';
                etaTotalMinutes = 0;
                etaTotalKm = 0;
                allSteps = [];
                document.getElementById('steps-list').innerHTML = '';
                return;
            }

            // Group jobs by identical address + city
            const groups = [];
            const groupMap = new Map();
            pendingJobs.forEach(job => {
                const key = `${job.pickup_location}, ${job.city}`.toLowerCase();
                if (!groupMap.has(key)) {
                    groupMap.set(key, { key, jobs: [], addrString: `${job.pickup_location}, ${job.city}` });
                }
                groupMap.get(key).jobs.push(job);
            });
            groupMap.forEach(group => groups.push(group));

            // Separate priority groups
            const priorityGroups = [];
            const normalGroups = [];
            groups.forEach(group => {
                if (group.jobs.some(j => j.manual_priority)) priorityGroups.push(group);
                else normalGroups.push(group);
            });

            priorityGroups.sort((a, b) => {
                const aId = a.jobs[0].id;
                const bId = b.jobs[0].id;
                const idxA = manualOrder.indexOf(aId);
                const idxB = manualOrder.indexOf(bId);
                return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
            });

            let orderedNormalGroups = normalGroups;
            if (normalGroups.length > 1) {
                let originAddress;
                if (priorityGroups.length > 0) {
                    originAddress = priorityGroups[priorityGroups.length - 1].addrString;
                } else {
                    originAddress = "1604 Moreland Ave, Brandon MB";
                }
                const destinationAddress = "1604 Moreland Ave, Brandon MB";
                try {
                    const origin = { address: originAddress };
                    const destination = { address: destinationAddress };
                    const waypoints = normalGroups.map(g => ({ address: g.addrString }));
                    const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI",
                            "X-Goog-FieldMask": "routes.optimizedIntermediateWaypointIndex"
                        },
                        body: JSON.stringify({
                            origin: origin,
                            destination: destination,
                            intermediates: waypoints,
                            travelMode: "DRIVE",
                            optimizeWaypointOrder: true
                        })
                    });
                    const data = await response.json();
                    if (data.routes && data.routes[0] && data.routes[0].optimizedIntermediateWaypointIndex) {
                        const indices = data.routes[0].optimizedIntermediateWaypointIndex;
                        orderedNormalGroups = indices.map(idx => normalGroups[idx]);
                    }
                } catch (e) {
                    console.warn("Optimization failed, using original order", e);
                }
            }

            const finalGroups = priorityGroups.concat(orderedNormalGroups);

            // Build optimizedOrder
            optimizedOrder = [];
            finalGroups.forEach(group => {
                group.jobs.forEach(job => optimizedOrder.push(job.id));
            });

            // Now compute full route with segmentation for >25 stops and get steps
            try {
                const depotAddress = "1604 Moreland Ave, Brandon MB";
                const maxIntermediates = 25;
                const totalGroups = finalGroups.length;
                let segments = [];
                let start = 0;
                while (start < totalGroups) {
                    let end = Math.min(start + maxIntermediates, totalGroups);
                    let segmentGroups = finalGroups.slice(start, end);
                    let originAddr = (start === 0) ? depotAddress : finalGroups[start - 1].addrString;
                    let destAddr, intermediates;
                    if (end === totalGroups) {
                        destAddr = depotAddress;
                        intermediates = segmentGroups.map(g => g.addrString);
                    } else {
                        destAddr = segmentGroups[segmentGroups.length - 1].addrString;
                        intermediates = segmentGroups.slice(0, -1).map(g => g.addrString);
                    }
                    segments.push({ originAddr, destAddr, intermediates, segmentGroups });
                    start = end;
                }

                let totalDurationSeconds = 0;
                let totalDistanceMeters = 0;
                let allLegs = [];
                let combinedPath = [];
                let allStepsTemp = [];

                for (let seg of segments) {
                    const origin = { address: seg.originAddr };
                    const destination = { address: seg.destAddr };
                    const waypoints = seg.intermediates.map(addr => ({ address: addr }));
                    const requestBody = {
                        origin: origin,
                        destination: destination,
                        intermediates: waypoints,
                        travelMode: "DRIVE",
                        optimizeWaypointOrder: false
                    };
                    const response = await fetch("https://routes.googleapis.com/directions/v2:computeRoutes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Goog-Api-Key": "AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI",
                            "X-Goog-FieldMask": "routes.duration,routes.polyline.encodedPolyline,routes.legs,routes.distanceMeters,routes.legs.steps"
                        },
                        body: JSON.stringify(requestBody)
                    });
                    const result = await response.json();
                    if (result.routes && result.routes[0]) {
                        const route = result.routes[0];
                        let segDuration = parseFloat(route.duration.replace('s', ''));
                        let segDistance = parseFloat(route.distanceMeters);
                        totalDurationSeconds += segDuration;
                        totalDistanceMeters += segDistance;
                        if (route.polyline) {
                            const path = google.maps.geometry.encoding.decodePath(route.polyline.encodedPolyline);
                            combinedPath = combinedPath.concat(path);
                        }
                        if (route.legs) {
                            for (let i = 0; i < seg.segmentGroups.length; i++) {
                                let leg = route.legs[i];
                                if (leg && leg.endLocation) {
                                    allLegs.push({ group: seg.segmentGroups[i], leg: leg });
                                }
                                // Extract steps from this leg
                                if (leg && leg.steps) {
                                    for (let step of leg.steps) {
                                        allStepsTemp.push({
                                            instruction: step.navigationInstruction ? step.navigationInstruction.instructions : (step.html_instructions || 'Continue'),
                                            distance: step.distanceMeters ? (parseFloat(step.distanceMeters) / 1000).toFixed(1) + ' km' : '',
                                            duration: step.staticDuration ? step.staticDuration.replace('s', '') + 's' : '',
                                            startLocation: step.startLocation ? step.startLocation.latLng : null,
                                            endLocation: step.endLocation ? step.endLocation.latLng : null
                                        });
                                    }
                                }
                            }
                        }
                    } else {
                        console.warn("Segment route failed:", result);
                    }
                }

                etaTotalMinutes = totalDurationSeconds / 60;
                etaTotalKm = totalDistanceMeters / 1000;

                // Store steps globally
                allSteps = allStepsTemp;
                currentStepIndex = 0;
                renderDirections();

                // Draw polyline
                if (map && combinedPath.length > 0) {
                    if (activePolyline) activePolyline.setMap(null);
                    activePolyline = new google.maps.Polyline({
                        path: combinedPath,
                        geodesic: true,
                        strokeColor: "#00d4ff",
                        strokeOpacity: 0.8,
                        strokeWeight: 6,
                        map: map
                    });
                }

                // Create markers
                if (map) {
                    Object.values(mapMarkers).forEach(m => m.setMap(null));
                    mapMarkers = {};
                    allLegs.forEach((item, idx) => {
                        const group = item.group;
                        const loc = item.leg.endLocation.latLng;
                        if (loc) {
                            group.jobs.forEach(job => {
                                db.ref(`developer/route_planner/jobs/${job.id}`).update({ lat: loc.latitude, lng: loc.longitude });
                            });
                            const firstJob = group.jobs[0];
                            const labelText = `${idx+1}. ${firstJob.name || ''}`;
                            const marker = new google.maps.Marker({
                                position: { lat: loc.latitude, lng: loc.longitude },
                                map: map,
                                label: {
                                    text: labelText,
                                    color: '#00b32d',
                                    fontWeight: 'bold',
                                    fontSize: '12px',
                                    className: 'driver-map-label'
                                },
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 14,
                                    fillColor: '#ff9800',
                                    fillOpacity: 1,
                                    strokeColor: 'white',
                                    strokeWeight: 2
                                }
                            });
                            mapMarkers[group.jobs[0].id] = marker;
                        }
                    });
                }

            } catch (e) {
                console.error("Route fetch error", e);
                optimizedOrder = [];
                finalGroups.forEach(group => group.jobs.forEach(job => optimizedOrder.push(job.id)));
                etaTotalMinutes = 0;
                etaTotalKm = 0;
                allSteps = [];
            }

            renderList();

            const mapBtn = document.getElementById('map-btn');
            if (mapBtn) {
                if (optimizedOrder.length > 0) {
                    mapBtn.classList.add('map-btn-glow');
                } else {
                    mapBtn.classList.remove('map-btn-glow');
                }
            }

            updateETADisplay();
        }

        // ---------- RENDER DIRECTIONS ----------
        function renderDirections() {
            const stepsList = document.getElementById('steps-list');
            if (!stepsList) return;
            if (!allSteps || allSteps.length === 0) {
                stepsList.innerHTML = '<div style="padding:12px;text-align:center;color:#aaa;">No directions available</div>';
                return;
            }
            let html = '';
            allSteps.forEach((step, idx) => {
                const activeClass = (idx === currentStepIndex) ? 'active-step' : '';
                html += `
                    <div class="step-item ${activeClass}" data-index="${idx}">
                        <div class="step-number">${idx+1}</div>
                        <div class="step-instruction">
                            <div>${step.instruction}</div>
                            <div class="step-detail">${step.distance} ${step.duration ? '· '+step.duration : ''}</div>
                        </div>
                    </div>
                `;
            });
            stepsList.innerHTML = html;
            // Update nav buttons
            document.getElementById('prev-step-btn').disabled = (currentStepIndex === 0);
            document.getElementById('next-step-btn').disabled = (currentStepIndex >= allSteps.length - 1);
            // Scroll to active step
            const activeEl = stepsList.querySelector('.active-step');
            if (activeEl) {
                activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
            // Update map marker highlight? We'll just center on step start location if available.
            if (allSteps[currentStepIndex] && allSteps[currentStepIndex].startLocation) {
                const loc = allSteps[currentStepIndex].startLocation;
                if (map && loc) {
                    map.panTo({ lat: loc.latitude, lng: loc.longitude });
                }
            }
        }

        function toggleDirectionsPanel() {
            const panel = document.getElementById('directions-panel');
            panel.classList.toggle('collapsed');
            const btn = document.getElementById('toggle-directions-btn');
            btn.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
        }

        function nextStep() {
            if (currentStepIndex < allSteps.length - 1) {
                currentStepIndex++;
                renderDirections();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderDirections();
            }
        }

        // ---------- RENDER JOB LIST ----------
        function renderList() {
            const container = document.getElementById('job-list');
            const emptyState = document.getElementById('empty-state');
            const counter = document.getElementById('stop-counter');
            if (!optimizedOrder || optimizedOrder.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                counter.style.display = 'none';
                return;
            }
            emptyState.style.display = 'none';
            counter.textContent = optimizedOrder.length;
            counter.style.display = 'inline-block';

            let html = '';
            optimizedOrder.forEach((id, index) => {
                const job = jobs[id];
                if (!job) return;
                const isPriority = job.manual_priority || false;
                const starClass = isPriority ? 'active' : '';
                html += `
                    <div class="job-item" data-id="${id}">
                        <span class="job-number">${index + 1}</span>
                        <div class="job-info">
                            <div class="job-name">${job.name || 'No name'}</div>
                            <div class="job-address">${job.pickup_location || ''}, ${job.city || ''}</div>
                        </div>
                        <svg class="star-icon ${starClass}" viewBox="0 0 24 24" onclick="togglePriority('${id}', ${isPriority})">
                            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                        </svg>
                        <svg class="delete-icon" viewBox="0 0 24 24" onclick="deleteJob('${id}')">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    </div>
                `;
            });
            container.innerHTML = html;
            initSortable();
        }

        // ---------- SORTABLE ----------
        let sortableInstance;
        function initSortable() {
            if (sortableInstance) sortableInstance.destroy();
            const list = document.getElementById('job-list');
            sortableInstance = new Sortable(list, {
                animation: 150,
                delay: 400,
                delayOnTouchOnly: true,
                draggable: '.job-item',
                ghostClass: 'sortable-ghost',
                onEnd: function(evt) {
                    const items = list.querySelectorAll('.job-item');
                    const newOrder = Array.from(items).map(item => item.dataset.id);
                    db.ref('developer/route_planner/manual_order').set(newOrder);
                    const draggedId = evt.item.dataset.id;
                    if (draggedId) {
                        db.ref(`developer/route_planner/jobs/${draggedId}/manual_priority`).set(true);
                    }
                }
            });
        }

        // ---------- MAP FUNCTIONS ----------
        function initMap() {
            if (!google.maps) return;
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 49.8425, lng: -99.9497 },
                zoom: 12,
                gestureHandling: 'greedy',
                styles: document.body.classList.contains('light-mode') ? [] : mapStyles
            });
            mainMap = map;
        }

        function openMap() {
            document.getElementById('map-modal').style.display = 'block';
            // Show directions panel if steps exist
            if (allSteps && allSteps.length > 0) {
                document.getElementById('directions-panel').classList.remove('collapsed');
                document.getElementById('toggle-directions-btn').textContent = '▼';
                renderDirections();
            } else {
                document.getElementById('directions-panel').classList.add('collapsed');
                document.getElementById('toggle-directions-btn').textContent = '▲';
            }
            setTimeout(() => {
                google.maps.event.trigger(map, 'resize');
                if (optimizedOrder.length > 0 && activePolyline) {
                    const bounds = new google.maps.LatLngBounds();
                    activePolyline.getPath().forEach(p => bounds.extend(p));
                    map.fitBounds(bounds);
                } else {
                    map.setCenter({ lat: 49.8425, lng: -99.9497 });
                    map.setZoom(12);
                }
            }, 100);
        }

        function closeMap() {
            document.getElementById('map-modal').style.display = 'none';
        }

        function zoomToAll() {
            if (activePolyline) {
                const bounds = new google.maps.LatLngBounds();
                activePolyline.getPath().forEach(p => bounds.extend(p));
                map.fitBounds(bounds);
            }
        }

        function resetMapView() {
            zoomToAll();
        }

        // ---------- EXTERNAL ROUTE NAVIGATION (limited to 10 stops) ----------
        function openExternalRoute() {
            if (optimizedOrder.length === 0) {
                alert("No stops to route.");
                return;
            }
            const origin = "1604 Moreland Ave, Brandon MB";
            const destination = "1604 Moreland Ave, Brandon MB";
            const maxStops = 10; // Google Maps URL limit
            let waypointStrings = [];
            for (let i = 0; i < Math.min(optimizedOrder.length, maxStops); i++) {
                const id = optimizedOrder[i];
                const job = jobs[id];
                if (!job) continue;
                const addr = job.pickup_location;
                const city = job.city || "Brandon";
                waypointStrings.push(encodeURIComponent(`${addr}, ${city}`));
            }
            const waypoints = waypointStrings.join("|");

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = `intent://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
            } else {
                window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
            }
        }

        // ---------- UPDATE ETA DISPLAY ----------
        function updateETADisplay() {
            const display = document.getElementById('eta-display');
            const etaTime = document.getElementById('eta-time');
            const etaAdjusted = document.getElementById('eta-adjusted');
            const etaAdjustedTime = document.getElementById('eta-adjusted-time');
            const etaDistance = document.getElementById('eta-distance');
            if (!optimizedOrder || optimizedOrder.length === 0 || etaTotalMinutes === 0) {
                display.style.display = 'none';
                display.classList.remove('eta-glow');
                return;
            }
            const totalMinutes = etaTotalMinutes;
            const hours = Math.floor(totalMinutes / 60);
            const mins = Math.round(totalMinutes % 60);
            let timeStr = '';
            if (hours > 0) timeStr += hours + 'h ';
            timeStr += mins + 'm';
            etaTime.textContent = timeStr;
            const stops = optimizedOrder.length;
            const adjustedMinutes = totalMinutes + 3 * stops;
            const adjHours = Math.floor(adjustedMinutes / 60);
            const adjMins = Math.round(adjustedMinutes % 60);
            let adjStr = '';
            if (adjHours > 0) adjStr += adjHours + 'h ';
            adjStr += adjMins + 'm';
            etaAdjustedTime.textContent = adjStr;
            etaAdjusted.style.display = 'inline';
            etaDistance.textContent = etaTotalKm.toFixed(1);
            display.style.display = 'block';
            display.classList.add('eta-glow');
        }

        // ---------- PWA INSTALL ----------
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
                document.getElementById('install-btn').style.display = 'none';
            }
        });

        function formatTime12(ts) { /* not used but kept for consistency */ }
    </script>
